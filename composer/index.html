<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In Suspended Harmony</title>
  <style>
    :root {
      --bg: #000;
      --fg: rgba(233, 228, 218, 0.9);
      --muted: rgba(233, 228, 218, 0.45);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.02em;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: #000;
    }

    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px 20px;
      z-index: 10;
      mix-blend-mode: screen;
    }

    .topline,
    .bottomline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .title {
      color: var(--fg);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .status {
      color: var(--fg);
    }

    .hint {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 11;
      pointer-events: none;
      text-align: center;
      color: rgba(233, 228, 218, 0.8);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      line-height: 1.9;
      transition: opacity 400ms ease;
      text-shadow: 0 0 20px rgba(255,255,255,0.08);
    }

    .hint.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <canvas id="visual"></canvas>

  <div class="overlay">
    <div class="topline">
      <div class="title">In Suspended Harmony</div>
      <div class="status" id="status">tap anywhere to play</div>
    </div>
    <div class="bottomline">
      <div id="phase">idle</div>
      <div id="time">00:00</div>
    </div>
  </div>

  <div class="hint" id="hint">
    TAP ANYWHERE TO BEGIN<br />
    TAP AGAIN TO STOP
  </div>

  <script>
    (() => {
      "use strict";

      const TOTAL_DURATION = 407.43;

      const canvas = document.getElementById("visual");
      const cx = canvas.getContext("2d");
      const hintEl = document.getElementById("hint");
      const timeEl = document.getElementById("time");
      const phaseEl = document.getElementById("phase");
      const statusEl = document.getElementById("status");

      let ac = null;
      let master = null;
      let analyser = null;
      let playing = false;
      let startedAt = 0;
      let raf = 0;
      let runtimeStops = [];
      let noiseNodes = [];
      let voices = [];
      let buses = {};
      let vizStarted = false;
      let stopTimeout = null;    // FIX 1: track pending stop timeout
      let iosAudioEl = null;     // FIX 2: iOS audio element reference
      let stopping = false;      // FIX 1: guard against race condition

      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      const SECTION_PLAN = [
        { start: 0.00,   end: 34.00,  amp: 0.10, filter: 760,  noise: 0.012, bass: 0.028, upper: 0.010 },
        { start: 34.00,  end: 76.00,  amp: 0.17, filter: 920,  noise: 0.018, bass: 0.032, upper: 0.016 },
        { start: 76.00,  end: 122.00, amp: 0.22, filter: 1020, noise: 0.020, bass: 0.036, upper: 0.020 },
        { start: 122.00, end: 168.00, amp: 0.27, filter: 1160, noise: 0.023, bass: 0.040, upper: 0.025 },
        { start: 168.00, end: 220.00, amp: 0.33, filter: 1320, noise: 0.026, bass: 0.046, upper: 0.031 },
        { start: 220.00, end: 274.00, amp: 0.39, filter: 1460, noise: 0.030, bass: 0.049, upper: 0.038 },
        { start: 274.00, end: 330.00, amp: 0.44, filter: 1540, noise: 0.034, bass: 0.050, upper: 0.043 },
        { start: 330.00, end: 365.00, amp: 0.23, filter: 1080, noise: 0.022, bass: 0.032, upper: 0.018 },
        { start: 365.00, end: 407.43, amp: 0.11, filter: 780,  noise: 0.014, bass: 0.020, upper: 0.011 }
      ];

      const HARMONIC_PLAN = [
        { start: 0.00,   end: 34.00,  label: "Gm/Eb opening",   bass: [31, 43],      body: [43, 46, 51, 55, 58, 63],     top: [67, 70] },
        { start: 34.00,  end: 76.00,  label: "Eb over G",       bass: [39, 43],      body: [39, 43, 46, 51, 55, 58, 63], top: [67, 70, 74] },
        { start: 76.00,  end: 122.00, label: "Bb suspended",    bass: [34, 46],      body: [46, 48, 53, 58, 60, 65],     top: [70, 72, 74] },
        { start: 122.00, end: 168.00, label: "F/C support",     bass: [29, 41, 48],  body: [41, 48, 53, 55, 60, 65],     top: [69, 72, 77] },
        { start: 168.00, end: 220.00, label: "G minor breadth", bass: [31, 43],      body: [43, 46, 50, 53, 55, 58, 62], top: [67, 70, 74] },
        { start: 220.00, end: 274.00, label: "Eb coloration",   bass: [39, 43],      body: [39, 43, 46, 51, 55, 58, 63], top: [67, 70, 75] },
        { start: 274.00, end: 330.00, label: "Bb / D / F area", bass: [34, 46],      body: [46, 50, 53, 58, 60, 62, 67], top: [70, 74, 77] },
        { start: 330.00, end: 365.00, label: "recession to G",  bass: [31, 43],      body: [43, 46, 50, 55, 58, 62],     top: [67, 70] },
        { start: 365.00, end: 407.43, label: "G-A-Bb-D ending", bass: [31, 43],      body: [43, 45, 46, 50, 55, 57, 58], top: [62, 67, 70] }
      ];

      const LEAD_PLAN = [
        { start: 0.00,   end: 34.00,  notes: [67, 70, 67],             amp: 0.015, filter: 1650 },
        { start: 34.00,  end: 76.00,  notes: [67, 70, 74, 70],         amp: 0.020, filter: 1780 },
        { start: 76.00,  end: 122.00, notes: [70, 72, 74, 72],         amp: 0.024, filter: 1880 },
        { start: 122.00, end: 168.00, notes: [69, 72, 77, 72],         amp: 0.027, filter: 1980 },
        { start: 168.00, end: 220.00, notes: [67, 70, 74, 79, 74],     amp: 0.031, filter: 2120 },
        { start: 220.00, end: 274.00, notes: [67, 70, 75, 79, 75],     amp: 0.034, filter: 2240 },
        { start: 274.00, end: 330.00, notes: [70, 74, 77, 82, 77, 74], amp: 0.038, filter: 2360 },
        { start: 330.00, end: 365.00, notes: [67, 70, 74, 70],         amp: 0.023, filter: 1820 },
        { start: 365.00, end: 407.43, notes: [67, 69, 70, 74, 70, 67], amp: 0.018, filter: 1700 }
      ];

      function midiToHz(m) {
        return 440 * Math.pow(2, (m - 69) / 12);
      }

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }

      function sectionAt(t) {
        for (const s of SECTION_PLAN) {
          if (t >= s.start && t < s.end) return s;
        }
        return SECTION_PLAN[SECTION_PLAN.length - 1];
      }

      function harmonicAt(t) {
        for (const h of HARMONIC_PLAN) {
          if (t >= h.start && t < h.end) return h;
        }
        return HARMONIC_PLAN[HARMONIC_PLAN.length - 1];
      }

      function createIR(ctx, seconds = 10, seed = 1337) {
        function rng() {
          seed = (seed * 1664525 + 1013904223) >>> 0;
          return seed / 4294967296;
        }
        const length = Math.floor(ctx.sampleRate * seconds);
        const ir = ctx.createBuffer(2, length, ctx.sampleRate);
        for (let ch = 0; ch < 2; ch++) {
          const d = ir.getChannelData(ch);
          let lp = 0;
          for (let i = 0; i < length; i++) {
            const t = i / length;
            const env = Math.pow(1 - t, 2.35);
            const white = rng() * 2 - 1;
            lp = lp * 0.986 + white * 0.09;
            d[i] = lp * env * (ch === 0 ? 1 : 0.97);
          }
        }
        return ir;
      }

      function createNoiseBuffer(ctx, seconds = 4, type = "brown", seed = 2026) {
        function rng() {
          seed = (seed * 1664525 + 1013904223) >>> 0;
          return seed / 4294967296;
        }
        const length = Math.floor(ctx.sampleRate * seconds);
        const buf = ctx.createBuffer(1, length, ctx.sampleRate);
        const d = buf.getChannelData(0);
        let last = 0;
        for (let i = 0; i < length; i++) {
          const white = rng() * 2 - 1;
          if (type === "brown") {
            last = (last + 0.02 * white) / 1.02;
            d[i] = last * 3.2;
          } else {
            d[i] = white * 0.5;
          }
        }
        return buf;
      }

      function makeVoice(ctx, type, freq, panValue, gainScale) {
        const oscA = ctx.createOscillator();
        const oscB = ctx.createOscillator();
        const oscSub = ctx.createOscillator();

        oscA.type = type === "air" ? "triangle" : "sawtooth";
        oscB.type = "triangle";
        oscSub.type = "sine";

        oscA.frequency.value = freq;
        oscB.frequency.value = freq * (type === "bass" ? 1.002 : 0.999);
        oscSub.frequency.value = type === "bass" ? freq * 0.5 : freq;

        const detuneLFO = ctx.createOscillator();
        detuneLFO.type = "sine";
        detuneLFO.frequency.value = type === "bass" ? 0.0046 : 0.006 + Math.abs(panValue) * 0.002;

        const detuneDepth = ctx.createGain();
        detuneDepth.gain.value = type === "bass" ? 2.5 : 4.5;
        detuneLFO.connect(detuneDepth);
        detuneDepth.connect(oscA.detune);

        const detuneLFO2 = ctx.createOscillator();
        detuneLFO2.type = "sine";
        detuneLFO2.frequency.value = 0.012 + Math.abs(panValue) * 0.003;

        const detuneDepth2 = ctx.createGain();
        detuneDepth2.gain.value = type === "bass" ? 1.2 : 2.6;
        detuneLFO2.connect(detuneDepth2);
        detuneDepth2.connect(oscB.detune);

        const formant = ctx.createBiquadFilter();
        formant.type = "bandpass";
        formant.frequency.value = type === "bass" ? 220 : type === "air" ? 1400 : type === "lead" ? 1180 : 690;
        formant.Q.value = type === "bass" ? 0.8 : type === "air" ? 0.55 : type === "lead" ? 1.35 : 0.9;

        const lowpass = ctx.createBiquadFilter();
        lowpass.type = "lowpass";
        lowpass.frequency.value = type === "bass" ? 520 : type === "air" ? 2500 : type === "lead" ? 1400 : 1400;
        lowpass.Q.value = type === "lead" ? 0.55 : 0.4;

        const highpass = ctx.createBiquadFilter();
        highpass.type = "highpass";
        highpass.frequency.value = type === "bass" ? 22 : type === "air" ? 300 : type === "lead" ? 420 : 80;
        highpass.Q.value = 0.4;

        const amp = ctx.createGain();
        amp.gain.value = 0.00001;

        const pan = ctx.createStereoPanner();
        pan.pan.value = panValue;

        const wet = ctx.createGain();
        wet.gain.value = type === "bass" ? 0.16 : type === "air" ? 0.52 : type === "lead" ? 0.18 : 0.34;

        const shimmer = ctx.createGain();
        shimmer.gain.value = type === "air" ? 0.14 : type === "lead" ? 0.04 : 0.05;

        oscA.connect(formant);
        oscB.connect(formant);
        oscSub.connect(formant);
        formant.connect(lowpass);
        lowpass.connect(highpass);
        highpass.connect(amp);

        amp.connect(pan);
        pan.connect(buses.dry);
        pan.connect(wet);
        wet.connect(buses.reverbIn);
        pan.connect(shimmer);
        shimmer.connect(buses.shimmerIn);

        oscA.start();
        oscB.start();
        oscSub.start();
        detuneLFO.start();
        detuneLFO2.start();

        runtimeStops.push(() => {
          try {
            oscA.stop();
            oscB.stop();
            oscSub.stop();
            detuneLFO.stop();
            detuneLFO2.stop();
          } catch (_) {}
        });

        return {
          type, oscA, oscB, oscSub, formant, lowpass, highpass, amp, pan,
          gainScale,
          setTarget(midi, section, absoluteTime, riseTime = 8) {
            const hz = midiToHz(midi);
            const tau = type === "bass" ? 7.5 : type === "air" ? 9.5 : 8.5;

            oscA.frequency.setTargetAtTime(hz, absoluteTime, tau);
            oscB.frequency.setTargetAtTime(hz * (type === "body" ? 1.0014 : 0.9988), absoluteTime, tau * 0.94);
            oscSub.frequency.setTargetAtTime(type === "bass" ? hz * 0.5 : hz, absoluteTime, tau * 0.88);

            const baseFilter = section.filter;
            const bodyFilter = type === "bass"
              ? baseFilter * 0.48
              : type === "air"
              ? baseFilter * 1.55
              : type === "lead"
              ? baseFilter * 1.45
              : baseFilter * 0.92;

            lowpass.frequency.setTargetAtTime(bodyFilter, absoluteTime, 11);

            formant.frequency.setTargetAtTime(
              type === "bass" ? hz * 2.05 : type === "air" ? hz * 3.4 : type === "lead" ? hz * 2.1 : hz * 2.6,
              absoluteTime,
              9
            );

            const sectionAmp = type === "bass"
              ? section.bass
              : type === "air"
              ? section.upper
              : type === "lead"
              ? section.upper * 1.2
              : section.amp * 0.08;

            amp.gain.setTargetAtTime(Math.max(0.00001, sectionAmp * gainScale), absoluteTime, riseTime);
          },
          fadeOut(absoluteTime, tau = 5) {
            amp.gain.setTargetAtTime(0.00001, absoluteTime, tau);
          }
        };
      }

      function ensureAudio() {
        if (ac) return;

        ac = new (window.AudioContext || window.webkitAudioContext)();

        master = ac.createGain();
        master.gain.value = 0.0001;

        analyser = ac.createAnalyser();
        analyser.fftSize = 4096;
        // FIX 3: Lower smoothing for more accurate amplitude response
        analyser.smoothingTimeConstant = 0.65;
        analyser.minDecibels = -90;
        analyser.maxDecibels = -10;

        buses.dry = ac.createGain();
        buses.dry.gain.value = 1;

        buses.reverbIn = ac.createGain();
        buses.reverbIn.gain.value = 1;

        buses.shimmerIn = ac.createGain();
        buses.shimmerIn.gain.value = 1;

        const convolver = ac.createConvolver();
        convolver.buffer = createIR(ac, 10, 1337);

        const reverbLP = ac.createBiquadFilter();
        reverbLP.type = "lowpass";
        reverbLP.frequency.value = 2200;

        const reverbHP = ac.createBiquadFilter();
        reverbHP.type = "highpass";
        reverbHP.frequency.value = 110;

        const shimmerDelay = ac.createDelay(2.5);
        shimmerDelay.delayTime.value = 0.38;

        const shimmerFeedback = ac.createGain();
        shimmerFeedback.gain.value = 0.18;

        const shimmerLP = ac.createBiquadFilter();
        shimmerLP.type = "lowpass";
        shimmerLP.frequency.value = 2800;

        const shimmerGain = ac.createGain();
        shimmerGain.gain.value = 0.12;

        const comp = ac.createDynamicsCompressor();
        comp.threshold.value = -20;
        comp.knee.value = 10;
        comp.ratio.value = 2.1;
        comp.attack.value = 0.03;
        comp.release.value = 0.22;

        buses.dry.connect(comp);
        buses.reverbIn.connect(convolver).connect(reverbLP).connect(reverbHP).connect(comp);
        buses.shimmerIn.connect(shimmerDelay).connect(shimmerLP).connect(shimmerGain).connect(comp);
        shimmerGain.connect(shimmerFeedback).connect(shimmerDelay);

        comp.connect(analyser);
        analyser.connect(master);
        master.connect(ac.destination);

        // FIX 2: iOS audio session activation
        // Web Audio alone does not fully activate the iOS audio session.
        // Route through a real HTML <audio> element to force iOS to play.
        if (isMobile && ac.createMediaStreamDestination) {
          try {
            const msDest = ac.createMediaStreamDestination();
            analyser.connect(msDest);
            iosAudioEl = document.createElement("audio");
            iosAudioEl.setAttribute("playsinline", "");
            iosAudioEl.srcObject = msDest.stream;
            iosAudioEl.play().catch(() => {});
          } catch (_) {}
        }

        runtimeStops.push(() => {
          try {
            buses.dry.disconnect();
            buses.reverbIn.disconnect();
            buses.shimmerIn.disconnect();
          } catch (_) {}
        });
      }

      function buildVoices() {
        voices = [];

        const bassPans = [-0.10, 0.10, -0.03, 0.03];
        const bodyPans = [-0.36, -0.25, -0.15, -0.07, 0.07, 0.15, 0.25, 0.36];
        const airPans = [-0.44, -0.28, -0.12, 0.12, 0.28, 0.44];
        const leadPans = [-0.05, 0.05];

        bassPans.forEach((p, i) => voices.push(makeVoice(ac, "bass", midiToHz(31 + i), p, 0.82 - i * 0.08)));
        bodyPans.forEach((p, i) => voices.push(makeVoice(ac, "body", midiToHz(43 + (i % 3) * 3), p, 0.68 + (i % 4) * 0.08)));
        airPans.forEach((p, i) => voices.push(makeVoice(ac, "air", midiToHz(67 + i), p, 0.50 + (i % 3) * 0.07)));
        leadPans.forEach((p, i) => voices.push(makeVoice(ac, "lead", midiToHz(67 + i * 3), p, 1.0 - i * 0.08)));
      }

      function scheduleNoise() {
        const brown = ac.createBufferSource();
        brown.buffer = createNoiseBuffer(ac, 4, "brown", 2026);
        brown.loop = true;

        const brownLP = ac.createBiquadFilter();
        brownLP.type = "lowpass";
        brownLP.frequency.value = 480;

        const brownHP = ac.createBiquadFilter();
        brownHP.type = "highpass";
        brownHP.frequency.value = 120;

        const brownGain = ac.createGain();
        brownGain.gain.value = 0.010;

        brown.connect(brownLP).connect(brownHP).connect(brownGain).connect(buses.dry);
        brown.connect(brownLP).connect(brownHP).connect(brownGain).connect(buses.reverbIn);
        brown.start();

        const air = ac.createBufferSource();
        air.buffer = createNoiseBuffer(ac, 4, "white", 4040);
        air.loop = true;

        const airBP = ac.createBiquadFilter();
        airBP.type = "bandpass";
        airBP.frequency.value = 1900;
        airBP.Q.value = 0.65;

        const airGain = ac.createGain();
        airGain.gain.value = 0.0015;

        air.connect(airBP).connect(airGain).connect(buses.reverbIn);
        air.start();

        noiseNodes.push({ brownGain, airGain, airBP, brownLP });

        runtimeStops.push(() => {
          try {
            brown.stop();
            air.stop();
          } catch (_) {}
        });
      }

      function scheduleForm() {
        const now = ac.currentTime;

        master.gain.setValueAtTime(0.0001, now);
        master.gain.linearRampToValueAtTime(0.44, now + 22);
        master.gain.linearRampToValueAtTime(0.68, now + 130);
        master.gain.linearRampToValueAtTime(0.78, now + 274);
        master.gain.linearRampToValueAtTime(0.40, now + 365);
        master.gain.linearRampToValueAtTime(0.0001, now + TOTAL_DURATION + 8);

        for (const h of HARMONIC_PLAN) {
          const section = sectionAt(h.start + 0.001);
          const t = now + h.start;

          const bassVoices = voices.filter(v => v.type === "bass");
          const bodyVoices = voices.filter(v => v.type === "body");
          const airVoices = voices.filter(v => v.type === "air");
          const leadVoices = voices.filter(v => v.type === "lead");

          bassVoices.forEach((v, i) => {
            const note = h.bass[i % h.bass.length];
            v.setTarget(note, section, t, 7.5 + i * 0.4);
          });

          bodyVoices.forEach((v, i) => {
            let midi = h.body[i % h.body.length];
            if (i < 2) midi -= 12;
            if (i >= 6) midi += 12;
            v.setTarget(midi, section, t, 8 + (i % 4) * 0.6);
          });

          airVoices.forEach((v, i) => {
            const midi = h.top[i % h.top.length] + (i > 3 ? 12 : 0);
            v.setTarget(midi, section, t, 10 + i * 0.5);
          });

          const leadState = LEAD_PLAN.find(s => h.start >= s.start && h.start < s.end) || LEAD_PLAN[LEAD_PLAN.length - 1];
          const leadSpan = leadState.end - leadState.start;

          leadVoices.forEach((v, i) => {
            const octave = i === 0 ? 1 : 2;
            const notes = leadState.notes;
            const noteDur = leadSpan / notes.length;
            const initial = notes[0] + (octave - 1) * 12;

            v.setTarget(initial, section, t + 1.5 + i * 0.2, 6.5);
            v.lowpass.frequency.setTargetAtTime(leadState.filter, t + 1.2, 6.5);
            v.amp.gain.setTargetAtTime(leadState.amp * v.gainScale, t + 1.2, 5.5);

            notes.forEach((note, idx) => {
              const noteTime = t + idx * noteDur;
              const targetMidi = note + (octave - 1) * 12;
              v.oscA.frequency.setTargetAtTime(midiToHz(targetMidi), noteTime, Math.max(3.6, noteDur * 0.18));
              v.oscB.frequency.setTargetAtTime(midiToHz(targetMidi) * 1.0016, noteTime, Math.max(3.1, noteDur * 0.16));
              v.formant.frequency.setTargetAtTime(midiToHz(targetMidi) * 2.05, noteTime, Math.max(2.8, noteDur * 0.14));
            });
          });

          const span = h.end - h.start;
          const mid1 = t + span * 0.28;
          const mid2 = t + span * 0.62;
          const target1 = midiToHz(h.top[0]);
          const target2 = midiToHz(h.top[Math.min(1, h.top.length - 1)]);
          const target3 = midiToHz(h.top[h.top.length - 1]);

          airVoices.forEach((v, i) => {
            const octave = i > 3 ? 2 : 1;
            v.oscA.frequency.setTargetAtTime(target1 * octave, t + 2 + i * 0.15, 10);
            v.oscA.frequency.setTargetAtTime(target2 * octave, mid1 + i * 0.18, 9);
            v.oscA.frequency.setTargetAtTime(target3 * octave, mid2 + i * 0.18, 9);
          });
        }

        for (let t = 18; t < TOTAL_DURATION - 20; t += 24) {
          const absolute = now + t;
          const section = sectionAt(t);

          voices.forEach((v, i) => {
            const bump = v.type === "lead" ? 1.22 : v.type === "air" ? 1.15 : v.type === "bass" ? 1.08 : 1.12;
            const back = v.type === "lead" ? 0.92 : v.type === "air" ? 0.96 : 1.0;
            const current = (
              v.type === "bass"
                ? section.bass
                : v.type === "air"
                ? section.upper
                : v.type === "lead"
                ? section.upper * 1.2
                : section.amp * 0.08
            ) * v.gainScale;

            v.amp.gain.setTargetAtTime(current * bump, absolute + i * 0.03, 3.8);
            v.amp.gain.setTargetAtTime(current * back, absolute + 7 + i * 0.03, 6.4);
          });
        }

        SECTION_PLAN.forEach(s => {
          const t = now + s.start;
          noiseNodes.forEach(n => {
            n.brownGain.gain.setTargetAtTime(s.noise, t, 7);
            n.airGain.gain.setTargetAtTime(Math.max(0.0008, s.upper * 0.08), t, 9);
            n.airBP.frequency.setTargetAtTime(s.filter * 1.6, t, 8);
            n.brownLP.frequency.setTargetAtTime(s.filter * 0.42, t, 8);
          });
        });

        const end = now + TOTAL_DURATION;
        voices.forEach((v, i) => v.fadeOut(end - 12 + i * 0.05, 5));
      }

      function drawVisualizer() {
        raf = requestAnimationFrame(drawVisualizer);

        const w = canvas.width;
        const h = canvas.height;

        // FIX 3: Slightly faster fade so trails reflect current amplitude, not accumulated history
        cx.fillStyle = "rgba(0,0,0,0.12)";
        cx.fillRect(0, 0, w, h);

        if (!analyser) return;

        const freqData = new Uint8Array(analyser.frequencyBinCount);
        const timeData = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(freqData);
        analyser.getByteTimeDomainData(timeData);

        function logScale(index, total) {
          const min = Math.log10(1);
          const max = Math.log10(total);
          return (Math.log10(index + 1) - min) / (max - min);
        }

        // FIX 3: Spectral fog with direct amplitude mapping (no power curve compression)
        for (let i = 0; i < freqData.length; i++) {
          const v = freqData[i] / 255;
          if (v < 0.015) continue;

          const x = logScale(i, freqData.length) * w;
          const spread = v * h * 0.55;
          const yCenter = h * 0.5;

          cx.globalAlpha = v * v * 0.6;
          cx.fillStyle = "#ffffff";
          cx.fillRect(x, yCenter - spread * 0.5, 1.5, spread);
        }

        // FIX 3: Harmonic ridge with full vertical range
        cx.beginPath();
        for (let i = 0; i < freqData.length; i++) {
          const v = freqData[i] / 255;
          const x = logScale(i, freqData.length) * w;
          const y = h * 0.5 - v * h * 0.45;
          if (i === 0) cx.moveTo(x, y);
          else cx.lineTo(x, y);
        }
        cx.strokeStyle = "rgba(255,255,255,0.28)";
        cx.lineWidth = 1.2;
        cx.stroke();

        // Low foundation
        cx.beginPath();
        for (let i = 0; i < 200; i++) {
          const v = freqData[i] / 255;
          const x = (i / 200) * w;
          const y = h - v * h * 0.25;
          if (i === 0) cx.moveTo(x, y);
          else cx.lineTo(x, y);
        }
        cx.strokeStyle = "rgba(255,255,255,0.14)";
        cx.lineWidth = 2;
        cx.stroke();

        // Air field
        for (let i = Math.floor(freqData.length * 0.6); i < freqData.length; i++) {
          const v = freqData[i] / 255;
          if (v < 0.01) continue;
          const x = logScale(i, freqData.length) * w;
          const y = Math.random() * h;
          cx.globalAlpha = v * 0.1;
          cx.fillStyle = "#ffffff";
          cx.fillRect(x, y, 1, 1);
        }

        // Time-domain ghost
        cx.beginPath();
        for (let i = 0; i < timeData.length; i++) {
          const v = (timeData[i] - 128) / 128;
          const x = (i / timeData.length) * w;
          const y = h * 0.5 + v * h * 0.08;
          if (i === 0) cx.moveTo(x, y);
          else cx.lineTo(x, y);
        }
        cx.strokeStyle = "rgba(255,255,255,0.05)";
        cx.lineWidth = 1;
        cx.stroke();

        cx.globalAlpha = 1;

        if (playing && ac) {
          const elapsed = clamp(ac.currentTime - startedAt, 0, TOTAL_DURATION);
          timeEl.textContent = formatTime(elapsed);
          phaseEl.textContent = harmonicAt(elapsed).label;
          statusEl.textContent = "playing";

          if (elapsed >= TOTAL_DURATION + 0.1) stop();
        } else if (!stopping) {
          statusEl.textContent = "idle";
        }
      }

      function cleanupAudioGraph() {
        runtimeStops.forEach(fn => fn());
        runtimeStops = [];
        noiseNodes = [];
        voices = [];
      }

      // FIX 1: Synchronous teardown that fully resets all state
      function forceCloseAudio() {
        // Cancel any pending stop timeout
        if (stopTimeout) {
          clearTimeout(stopTimeout);
          stopTimeout = null;
        }
        // Stop all oscillators and disconnect graph
        cleanupAudioGraph();
        // Clean up iOS audio element
        if (iosAudioEl) {
          try { iosAudioEl.pause(); iosAudioEl.srcObject = null; } catch (_) {}
          iosAudioEl = null;
        }
        // Close AudioContext
        if (ac) {
          try { ac.close(); } catch (_) {}
        }
        ac = null;
        master = null;
        analyser = null;
        buses = {};
        playing = false;
        stopping = false;
      }

      async function play() {
        // FIX 1: If a stop is pending, force-close everything first
        if (stopping || ac) {
          forceCloseAudio();
        }

        // Now we are guaranteed: ac is null, nothing is pending
        ensureAudio();
        await ac.resume();

        buildVoices();
        scheduleNoise();
        scheduleForm();

        startedAt = ac.currentTime;
        playing = true;
        stopping = false;
        hintEl.classList.add("hidden");

        if (!vizStarted) {
          vizStarted = true;
          drawVisualizer();
        }
      }

      async function stop() {
        if (!ac || stopping) return;

        playing = false;
        stopping = true;
        timeEl.textContent = "00:00";
        phaseEl.textContent = "idle";
        statusEl.textContent = "stopping";

        // Stop all oscillators immediately
        cleanupAudioGraph();

        // Fade master to zero
        try {
          const now = ac.currentTime;
          master.gain.cancelScheduledValues(now);
          master.gain.setValueAtTime(master.gain.value, now);
          master.gain.linearRampToValueAtTime(0.0001, now + 2);
        } catch (_) {}

        // FIX 1: Store timeout so play() can cancel it if user taps again
        stopTimeout = setTimeout(() => {
          // Clean up iOS audio element
          if (iosAudioEl) {
            try { iosAudioEl.pause(); iosAudioEl.srcObject = null; } catch (_) {}
            iosAudioEl = null;
          }
          if (ac) {
            try { ac.close(); } catch (_) {}
          }
          ac = null;
          master = null;
          analyser = null;
          buses = {};
          stopping = false;
          stopTimeout = null;
          statusEl.textContent = "tap anywhere to play";
        }, 2200);
      }

      // FIX 1: Unified tap handler with proper state management
      window.addEventListener("pointerdown", async () => {
        if (stopping) {
          // User tapped during fadeout: force restart
          await play();
        } else if (!playing) {
          await play();
        } else {
          await stop();
        }
      });

      // FIX 2: iOS audio session watchdog
      setInterval(() => {
        if (ac && playing && ac.state === "suspended") {
          ac.resume();
        }
      }, 500);

      // FIX 2: Resume on visibility change (iOS backgrounding)
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden && ac && playing && ac.state === "suspended") {
          ac.resume();
        }
      });

      // FIX 2: Resume on touch (iOS reclaims audio session)
      document.addEventListener("touchstart", () => {
        if (ac && playing && ac.state === "suspended") {
          ac.resume();
        }
      }, { passive: true });

    })();
  </script>
</body>
</html>
