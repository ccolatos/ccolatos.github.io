<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Composer | Chris Colatos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: rgba(233,228,218,0.9); font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; letter-spacing: 0.02em; -webkit-font-smoothing: antialiased; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; background: #000; }
    .chooser { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; transition: opacity 600ms ease; }
    .chooser.hidden { opacity: 0; pointer-events: none; }
    .chooser-btn { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-weight: 300; font-size: clamp(0.7rem, 1.8vw, 0.85rem); color: rgba(233,228,218,0.85); background: none; border: 1px solid rgba(233,228,218,0.18); padding: 20px 44px; cursor: pointer; letter-spacing: 0.18em; text-transform: uppercase; transition: border-color 400ms ease, color 300ms ease; width: min(380px, 80vw); text-align: center; }
    .chooser-btn:hover { border-color: rgba(233,228,218,0.5); color: rgba(233,228,218,1); }
    .overlay { position: fixed; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 18px 20px; z-index: 10; mix-blend-mode: screen; opacity: 0; transition: opacity 600ms ease; }
    .overlay.visible { opacity: 1; }
    .topline, .bottomline { display: flex; justify-content: space-between; align-items: center; gap: 16px; font-size: 12px; color: rgba(233,228,218,0.45); text-transform: uppercase; letter-spacing: 0.14em; }
    .title { color: rgba(233,228,218,0.9); font-size: 12px; letter-spacing: 0.18em; text-transform: none; }
    .hint { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 15; pointer-events: none; text-align: center; color: rgba(233,228,218,0.5); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0; transition: opacity 400ms ease; }
    .hint.visible { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="visual"></canvas>
  <div class="chooser" id="chooser">
    <button class="chooser-btn" data-inst="ish">In Suspended Harmony</button>
    <button class="chooser-btn" data-inst="lem">Lemniscate</button>
    <button class="chooser-btn" data-inst="gen" style="text-transform:none;letter-spacing:0.14em">GENDY c<sup style="font-size:0.7em">2</sup></button>
    <button class="chooser-btn" data-inst="chi">Chiaroscuro</button>
    <button class="chooser-btn" data-inst="erg">Ergodic</button>
  </div>
  <div class="overlay" id="overlay">
    <div class="topline"><div class="title" id="title"></div><div id="status"></div></div>
    <div class="bottomline"><div id="phase">idle</div><div id="time">00:00</div></div>
  </div>
  <div class="hint" id="hint">tap anywhere to stop</div>

  <script>
    (() => {
      "use strict";

      const DUR = 407;
      const NV = 20;
      const canvas = document.getElementById("visual");
      const cx = canvas.getContext("2d");
      const chooserEl = document.getElementById("chooser");
      const overlayEl = document.getElementById("overlay");
      const hintEl = document.getElementById("hint");
      const titleEl = document.getElementById("title");
      const timeEl = document.getElementById("time");
      const phaseEl = document.getElementById("phase");
      const statusEl = document.getElementById("status");

      let ac = null, master = null, analyser = null, dssNode = null;
      let playing = false, startedAt = 0, vizStarted = false;
      let stopTimeout = null, iosAudioEl = null, stopping = false;
      let runtimeStops = [], noiseNodes = [], buses = {};
      let updateInterval = null, currentInst = null;
      let activeVoices = new Set();
      let voiceGainsCurrent = new Float32Array(NV);
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      // --- visualizer state (persistent across frames, no per-frame allocations) ---
      let _vFreq = null, _vTime = null, _vt = 0;
      let _vBass = 0, _vMid = 0, _vHigh = 0, _vEnergy = 0;
      let _vLastTs = 0;

      function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
      addEventListener("resize", resize); resize();

      // ================================================================
      // DSS AUDIOWORKLET (shared, with gain target smoothing)
      // ================================================================

      const WORKLET_CODE = `
class DSSProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this.voices = [];
    this.port.onmessage = (e) => {
      const d = e.data;
      if (d.type === "init") this.voices = d.voices.map(v => this.mkVoice(v));
      else if (d.type === "update") this.applyUpdates(d.updates);
      else if (d.type === "clear") this.voices = [];
    };
  }
  gauss() {
    let u = 0, v = 0;
    while (!u) u = Math.random();
    while (!v) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }
  cauchy() {
    let v;
    do { v = Math.tan(Math.PI * (Math.random() - 0.5)); } while (Math.abs(v) > 8);
    return v;
  }
  stochStep(dist) { return Math.random() < dist ? this.cauchy() : this.gauss(); }
  reflect(val, lo, hi) {
    if (val > hi) val = hi - (val - hi);
    if (val < lo) val = lo + (lo - val);
    return Math.max(lo, Math.min(hi, val));
  }
  mkVoice(p) {
    const n = p.n || 8, ab = p.ab || 0.7, sr = sampleRate;
    const dMin = Math.max(1, Math.ceil(sr / (p.fMax * n)));
    const dMax = Math.max(dMin + 1, Math.ceil(sr / (p.fMin * n)));
    const amps = new Float32Array(n), durs = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      amps[i] = Math.sin(2 * Math.PI * i / n) * ab * 0.6;
      durs[i] = (dMin + dMax) / 2;
    }
    return {
      n, amps, durs, ab, dMin, dMax,
      sa: p.sa||0.08, sd: p.sd||0.04, dist: p.dist||0,
      saMin: p.saMin||0.01, saMax: p.saMax||0.3,
      sdMin: p.sdMin||0.005, sdMax: p.sdMax||0.15,
      saRate: p.saRate||0.005, sdRate: p.sdRate||0.003,
      bp: 0, si: 0, g: p.g >= 0 ? p.g : 0.02, gT: p.g >= 0 ? p.g : 0.02, pan: p.pan||0
    };
  }
  applyUpdates(updates) {
    for (let i = 0; i < updates.length && i < this.voices.length; i++) {
      const u = updates[i], v = this.voices[i];
      if (u.fMin !== undefined) v.dMax = Math.max(v.dMin+1, Math.ceil(sampleRate/(u.fMin*v.n)));
      if (u.fMax !== undefined) v.dMin = Math.max(1, Math.ceil(sampleRate/(u.fMax*v.n)));
      if (v.dMin >= v.dMax) v.dMax = v.dMin + 1;
      if (u.g !== undefined) v.gT = u.g;
      if (u.sa !== undefined) v.sa = u.sa;
      if (u.sd !== undefined) v.sd = u.sd;
      if (u.ab !== undefined) v.ab = u.ab;
      if (u.dist !== undefined) v.dist = u.dist;
      if (u.saMin !== undefined) v.saMin = u.saMin;
      if (u.saMax !== undefined) v.saMax = u.saMax;
      if (u.sdMin !== undefined) v.sdMin = u.sdMin;
      if (u.sdMax !== undefined) v.sdMax = u.sdMax;
      if (u.saRate !== undefined) v.saRate = u.saRate;
      if (u.sdRate !== undefined) v.sdRate = u.sdRate;
    }
  }
  process(inputs, outputs) {
    const L = outputs[0][0], R = outputs[0][1];
    if (!L) return true;
    for (let s = 0; s < L.length; s++) {
      let sL = 0, sR = 0;
      for (const v of this.voices) {
        v.g += (v.gT - v.g) * 0.002;
        if (v.g < 0.0005) {
          v.si++;
          const dur = Math.max(1, Math.round(v.durs[v.bp]));
          if (v.si >= dur) { v.si = 0; v.bp = (v.bp + 1) % v.n; }
          continue;
        }
        const cur = v.amps[v.bp], nxt = v.amps[(v.bp+1)%v.n];
        const dur = Math.max(1, Math.round(v.durs[v.bp]));
        const t = v.si / dur;
        const sample = cur + (nxt - cur) * t;
        const ang = (v.pan+1) * 0.25 * Math.PI;
        sL += sample * v.g * Math.cos(ang);
        sR += sample * v.g * Math.sin(ang);
        v.si++;
        if (v.si >= dur) {
          v.si = 0;
          v.bp = (v.bp + 1) % v.n;
          if (v.bp === 0) {
            v.sa = this.reflect(v.sa + this.gauss()*v.saRate, v.saMin, v.saMax);
            v.sd = this.reflect(v.sd + this.gauss()*v.sdRate, v.sdMin, v.sdMax);
            for (let b = 0; b < v.n; b++) {
              v.amps[b] = this.reflect(v.amps[b] + this.stochStep(v.dist)*v.sa*v.ab, -v.ab, v.ab);
              v.durs[b] = this.reflect(v.durs[b] + this.stochStep(v.dist)*v.sd*(v.dMax-v.dMin), v.dMin, v.dMax);
            }
          }
        }
      }
      L[s] = sL; if (R) R[s] = sR;
    }
    return true;
  }
}
registerProcessor("dss-processor", DSSProcessor);
`;

      // ================================================================
      // SHARED UTILITIES
      // ================================================================

      function midiToHz(m) { return 440 * Math.pow(2, (m - 69) / 12); }
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function fmt(s) { return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`; }
      function baseGain(n) { return n <= 4 ? 0.16 : n <= 6 ? 0.11 : n <= 8 ? 0.13 : 0.09; }

      // Shared voice definitions (used by LEM and GEN)
      const SHARED_VOICES = [
        { n:4,  fLo:25,  fHi:350,  ab:0.90, pan:-0.08 },
        { n:4,  fLo:30,  fHi:400,  ab:0.90, pan: 0.08 },
        { n:4,  fLo:28,  fHi:320,  ab:0.85, pan:-0.02 },
        { n:4,  fLo:35,  fHi:380,  ab:0.85, pan: 0.02 },
        { n:8,  fLo:55,  fHi:1200, ab:0.75, pan:-0.32 },
        { n:8,  fLo:70,  fHi:1400, ab:0.75, pan:-0.20 },
        { n:8,  fLo:60,  fHi:1300, ab:0.70, pan:-0.10 },
        { n:8,  fLo:80,  fHi:1500, ab:0.70, pan:-0.04 },
        { n:8,  fLo:65,  fHi:1250, ab:0.75, pan: 0.04 },
        { n:8,  fLo:75,  fHi:1350, ab:0.75, pan: 0.10 },
        { n:8,  fLo:58,  fHi:1100, ab:0.70, pan: 0.20 },
        { n:8,  fLo:85,  fHi:1600, ab:0.70, pan: 0.32 },
        { n:14, fLo:180, fHi:4000, ab:0.50, pan:-0.40 },
        { n:14, fLo:220, fHi:4500, ab:0.50, pan:-0.24 },
        { n:14, fLo:200, fHi:3800, ab:0.45, pan:-0.10 },
        { n:14, fLo:250, fHi:5000, ab:0.45, pan: 0.10 },
        { n:14, fLo:210, fHi:4200, ab:0.50, pan: 0.24 },
        { n:14, fLo:240, fHi:4800, ab:0.50, pan: 0.40 },
        { n:6,  fLo:90,  fHi:2000, ab:0.60, pan:-0.04 },
        { n:6,  fLo:110, fHi:2500, ab:0.60, pan: 0.04 }
      ];

      function buildFreeParams(section, voices, gains) {
        const params = [], st = section.stoch, di = section.dist, fs = section.fScale;
        voices.forEach((def, idx) => {
          const center = (def.fLo + def.fHi) / 2;
          const halfW = (def.fHi - def.fLo) / 2;
          const fMin = Math.max(20, center - halfW * fs);
          const fMax = Math.max(fMin * 1.5, center + halfW * fs);
          const complexity = def.n <= 4 ? 0.7 : def.n <= 6 ? 0.85 : def.n <= 8 ? 1.0 : 1.3;
          params.push({
            n: def.n, fMin, fMax, ab: def.ab,
            sa: st*complexity, sd: st*complexity*0.5, dist: di*complexity,
            saRate: st*0.08, sdRate: st*0.04,
            saMin: st*0.15, saMax: st*2.5, sdMin: st*0.08, sdMax: st*1.5,
            g: gains ? gains[idx] : (def.n<=4 ? 0.042 : def.n<=6 ? 0.028 : def.n<=8 ? 0.030 : 0.020),
            pan: def.pan
          });
        });
        return params;
      }

      // ================================================================
      // INSTRUMENT: IN SUSPENDED HARMONY
      // ================================================================

      const ISH = {
        name: "IN SUSPENDED HARMONY",
        lpFreq: 600, sparse: false,
        sections: [
          { start: 0,   end: 35,  amp: 0.10, flt: 600,  noise: 0.006, stoch: 0.03, dist: 0.0,  label: "emergence" },
          { start: 35,  end: 80,  amp: 0.18, flt: 800,  noise: 0.012, stoch: 0.05, dist: 0.0,  label: "the fifth" },
          { start: 80,  end: 130, amp: 0.28, flt: 1000, noise: 0.018, stoch: 0.08, dist: 0.05, label: "warmth" },
          { start: 130, end: 180, amp: 0.38, flt: 1180, noise: 0.022, stoch: 0.10, dist: 0.15, label: "depth" },
          { start: 180, end: 230, amp: 0.48, flt: 1380, noise: 0.026, stoch: 0.13, dist: 0.30, label: "expansion" },
          { start: 230, end: 285, amp: 0.58, flt: 1560, noise: 0.036, stoch: 0.18, dist: 0.65, label: "full spectrum" },
          { start: 285, end: 330, amp: 0.34, flt: 1050, noise: 0.020, stoch: 0.09, dist: 0.20, label: "dissolution" },
          { start: 330, end: 370, amp: 0.18, flt: 800,  noise: 0.012, stoch: 0.04, dist: 0.0,  label: "memory" },
          { start: 370, end: 407, amp: 0.08, flt: 580,  noise: 0.005, stoch: 0.02, dist: 0.0,  label: "return" }
        ],
        harmony: [
          { start: 0,   end: 35,  bass: [34,46],    body: [46,46,58,58,58,58,58,58],  air: [70,70,70,70,70,70] },
          { start: 35,  end: 80,  bass: [34,46],    body: [46,53,53,58,58,65,65,65],  air: [70,77,70,77,70,77] },
          { start: 80,  end: 130, bass: [34,46],    body: [46,50,53,58,62,65,65,70],  air: [70,74,77,70,74,77] },
          { start: 130, end: 180, bass: [34,44],    body: [44,46,50,56,58,62,65,68],  air: [68,70,74,68,70,74] },
          { start: 180, end: 230, bass: [34,46],    body: [46,48,50,53,58,60,62,65],  air: [70,72,74,77,70,72] },
          { start: 230, end: 285, bass: [34,41,46], body: [46,48,50,53,56,58,60,62],  air: [68,70,72,74,77,70] },
          { start: 285, end: 330, bass: [34,46],    body: [46,50,53,58,62,65,65,70],  air: [70,74,70,74,70,74] },
          { start: 330, end: 370, bass: [34,46],    body: [46,53,53,58,58,65,65,65],  air: [70,77,70,77,70,77] },
          { start: 370, end: 407, bass: [34,46],    body: [46,46,57,58,58,58,58,58],  air: [69,70,69,70,69,70] }
        ],
        lerpSection(elapsed) {
          const S = this.sections;
          for (let i = 0; i < S.length - 1; i++) {
            if (elapsed < S[i+1].start) {
              const t = (elapsed - S[i].start) / (S[i+1].start - S[i].start);
              const a = S[i], b = S[i+1];
              return { amp: lerp(a.amp,b.amp,t), flt: lerp(a.flt,b.flt,t), noise: lerp(a.noise,b.noise,t), stoch: lerp(a.stoch,b.stoch,t), dist: lerp(a.dist,b.dist,t), label: t<0.5?a.label:b.label };
            }
          }
          return S[S.length - 1];
        },
        harmonyAt(t) { for (const h of this.harmony) if (t >= h.start && t < h.end) return h; return this.harmony[this.harmony.length - 1]; },
        initVoices(section) { return this._buildParams(section, this.harmony[0], false); },
        updateVoices(section, elapsed) { return this._buildParams(section, this.harmonyAt(elapsed), true); },
        _buildParams(section, harmony, isUpdate) {
          const params = [], st = section.stoch, di = section.dist;
          [-0.06,0.06,-0.02,0.02].forEach((pan, i) => {
            const hz = midiToHz(harmony.bass[i % harmony.bass.length]);
            params.push({ n:4, fMin:hz*0.95, fMax:hz*1.05, ab:0.85, sa:st*0.6, sd:st*0.3, dist:di*0.5, saRate:st*0.06, sdRate:st*0.03, saMin:st*0.15, saMax:st*2.0, sdMin:st*0.08, sdMax:st*1.2, g: isUpdate ? section.amp*0.08 : 0.038, pan });
          });
          [-0.30,-0.20,-0.10,-0.03,0.03,0.10,0.20,0.30].forEach((pan, i) => {
            let midi = harmony.body[i % harmony.body.length]; if (i<2) midi -= 12; if (i>=6) midi += 12;
            const hz = midiToHz(midi);
            params.push({ n:8, fMin:hz*0.93, fMax:hz*1.07, ab:0.70, sa:st, sd:st*0.5, dist:di, saRate:st*0.08, sdRate:st*0.04, saMin:st*0.2, saMax:st*2.5, sdMin:st*0.1, sdMax:st*1.5, g: isUpdate ? section.amp*0.055 : 0.028, pan });
          });
          [-0.38,-0.22,-0.08,0.08,0.22,0.38].forEach((pan, i) => {
            const midi = harmony.air[i % harmony.air.length] + (i>3?12:0); const hz = midiToHz(midi);
            params.push({ n:14, fMin:hz*0.90, fMax:hz*1.10, ab:0.45, sa:st*1.3, sd:st*0.7, dist:di*1.2, saRate:st*0.10, sdRate:st*0.06, saMin:st*0.25, saMax:st*3.0, sdMin:st*0.12, sdMax:st*2.0, g: isUpdate ? section.amp*0.038 : 0.020, pan });
          });
          [-0.03,0.03].forEach((pan, i) => {
            const midi = harmony.air[0] + (i===1?12:0); const hz = midiToHz(midi);
            params.push({ n:6, fMin:hz*0.97, fMax:hz*1.03, ab:0.55, sa:st*0.4, sd:st*0.2, dist:di*0.3, saRate:st*0.04, sdRate:st*0.02, saMin:st*0.1, saMax:st*1.5, sdMin:st*0.05, sdMax:st*0.8, g: isUpdate ? section.amp*0.028 : 0.014, pan });
          });
          return params;
        },
        scheduleMaster(ac, master) {
          const now = ac.currentTime;
          master.gain.setValueAtTime(0.0001, now);
          master.gain.linearRampToValueAtTime(0.64, now + 25);
          master.gain.linearRampToValueAtTime(1.04, now + 130);
          master.gain.linearRampToValueAtTime(1.60, now + 260);
          master.gain.linearRampToValueAtTime(0.67, now + 340);
          master.gain.linearRampToValueAtTime(0.0001, now + DUR + 10);
        },
        onUpdate(elapsed, section) {
          const now = ac.currentTime;
          buses.lp.frequency.setTargetAtTime(section.flt, now, 0.4);
          noiseNodes.forEach(n => {
            n.bG.gain.setTargetAtTime(section.noise, now, 0.4);
            n.wG.gain.setTargetAtTime(Math.max(0.0005, section.amp * 0.006), now, 0.4);
            n.bLP.frequency.setTargetAtTime(section.flt * 0.35, now, 0.4);
            n.wBP.frequency.setTargetAtTime(section.flt * 1.3, now, 0.4);
          });
        }
      };

      // ================================================================
      // INSTRUMENT: LEMNISCATE (all 20 voices, flat dynamics)
      // ================================================================

      const LEM = {
        name: "LEMNISCATE",
        lpFreq: 5000, sparse: false,
        sections: [
          { start: 0,   end: 60,  amp: 0.12, flt: 700,  noise: 0.008, stoch: 0.06, dist: 0.0,  fScale: 0.35, label: "field i" },
          { start: 60,  end: 140, amp: 0.25, flt: 1000, noise: 0.016, stoch: 0.10, dist: 0.10, fScale: 0.55, label: "field ii" },
          { start: 140, end: 220, amp: 0.42, flt: 1300, noise: 0.024, stoch: 0.15, dist: 0.35, fScale: 0.75, label: "field iii" },
          { start: 220, end: 300, amp: 0.58, flt: 1600, noise: 0.036, stoch: 0.22, dist: 0.70, fScale: 1.0,  label: "field iv" },
          { start: 300, end: 370, amp: 0.25, flt: 900,  noise: 0.014, stoch: 0.08, dist: 0.15, fScale: 0.45, label: "field v" },
          { start: 370, end: 407, amp: 0.08, flt: 550,  noise: 0.004, stoch: 0.03, dist: 0.0,  fScale: 0.20, label: "field vi" }
        ],
        lerpSection(elapsed) {
          const S = this.sections;
          for (let i = 0; i < S.length - 1; i++) {
            if (elapsed < S[i+1].start) {
              const t = (elapsed - S[i].start) / (S[i+1].start - S[i].start);
              const a = S[i], b = S[i+1];
              return { amp: lerp(a.amp,b.amp,t), flt: lerp(a.flt,b.flt,t), noise: lerp(a.noise,b.noise,t), stoch: lerp(a.stoch,b.stoch,t), dist: lerp(a.dist,b.dist,t), fScale: lerp(a.fScale,b.fScale,t), label: t<0.5?a.label:b.label };
            }
          }
          return S[S.length - 1];
        },
        initVoices(section) { return buildFreeParams(section, SHARED_VOICES); },
        updateVoices(section) { return buildFreeParams(section, SHARED_VOICES); },
        scheduleMaster(ac, master) {
          const now = ac.currentTime;
          master.gain.setValueAtTime(0.0001, now);
          master.gain.linearRampToValueAtTime(1.0, now + 3);
          master.gain.setValueAtTime(1.0, now + DUR - 1);
          master.gain.linearRampToValueAtTime(0.0001, now + DUR + 10);
        },
        onUpdate() {}
      };

      // ================================================================
      // INSTRUMENT: GENDY c2 (sparse, 1-5 voices, GENDY3-faithful)
      // ================================================================

      const GEN = {
        name: 'GENDY c<sup style="font-size:0.7em">2</sup>',
        lpFreq: 8000, sparse: true,
        sections: [
          { start: 0,   end: 60,  amp: 0.12, flt: 700,  noise: 0.008, stoch: 0.06, dist: 0.0,  fScale: 0.35, density: 1.0, label: "field i" },
          { start: 60,  end: 140, amp: 0.25, flt: 1000, noise: 0.016, stoch: 0.10, dist: 0.10, fScale: 0.55, density: 1.8, label: "field ii" },
          { start: 140, end: 220, amp: 0.42, flt: 1300, noise: 0.024, stoch: 0.15, dist: 0.35, fScale: 0.75, density: 2.5, label: "field iii" },
          { start: 220, end: 300, amp: 0.58, flt: 1600, noise: 0.036, stoch: 0.22, dist: 0.70, fScale: 1.0,  density: 4.0, label: "field iv" },
          { start: 300, end: 370, amp: 0.25, flt: 900,  noise: 0.014, stoch: 0.08, dist: 0.15, fScale: 0.45, density: 2.0, label: "field v" },
          { start: 370, end: 407, amp: 0.08, flt: 550,  noise: 0.004, stoch: 0.03, dist: 0.0,  fScale: 0.20, density: 1.0, label: "field vi" }
        ],
        lerpSection(elapsed) {
          const S = this.sections;
          for (let i = 0; i < S.length - 1; i++) {
            if (elapsed < S[i+1].start) {
              const t = (elapsed - S[i].start) / (S[i+1].start - S[i].start);
              const a = S[i], b = S[i+1];
              return { amp: lerp(a.amp,b.amp,t), flt: lerp(a.flt,b.flt,t), noise: lerp(a.noise,b.noise,t), stoch: lerp(a.stoch,b.stoch,t), dist: lerp(a.dist,b.dist,t), fScale: lerp(a.fScale,b.fScale,t), density: lerp(a.density,b.density,t), label: t<0.5?a.label:b.label };
            }
          }
          return S[S.length - 1];
        },
        initVoices(section) { return buildFreeParams(section, SHARED_VOICES, voiceGainsCurrent); },
        updateVoices(section) { return buildFreeParams(section, SHARED_VOICES, voiceGainsCurrent); },
        scheduleMaster(ac, master) {
          const now = ac.currentTime;
          master.gain.setValueAtTime(0.0001, now);
          master.gain.linearRampToValueAtTime(1.0, now + 3);
          master.gain.setValueAtTime(1.0, now + DUR - 1);
          master.gain.linearRampToValueAtTime(0.0001, now + DUR + 10);
        },
        onUpdate() {}
      };

      // ================================================================
      // INSTRUMENT: CHIAROSCURO
      //
      // 8:08. Light and shadow. A composition of rotating leadership,
      // harmonic progression, breathing swells, and structural Cauchy
      // events as punctuation. Each voice class takes prominence in
      // turn. The piece modulates through multiple tonal centers before
      // returning home. Shorter voice presences create form you can
      // hear: voices enter, swell, and withdraw as gestures.
      // ================================================================

      // Chiaroscuro timing (488 seconds total)
      // The piece has 12 regions, each with its own tonal center,
      // lead voice class, and stoch/dist profile. Cauchy events fire
      // at structural moments (region transitions with dramatic shifts).
      const CHI_DUR = 488;

      // Each region: center (MIDI root), mode, lead class, stoch, dist, cauchyBurst
      const CHI_REGIONS = [
        { start: 0,   end: 38,  root: 34, mode: "majorish",  lead: "bass", stoch: 0.04, dist: 0.0,  cauchy: false, label: "emergence (Bb)" },
        { start: 38,  end: 82,  root: 34, mode: "majorish",  lead: "body", stoch: 0.07, dist: 0.0,  cauchy: false, label: "opening (Bb)" },
        { start: 82,  end: 128, root: 41, mode: "majorish",  lead: "air",  stoch: 0.10, dist: 0.1,  cauchy: true,  label: "ascent (F)" },
        { start: 128, end: 176, root: 39, mode: "majorish",  lead: "body", stoch: 0.12, dist: 0.15, cauchy: false, label: "shadow (Eb)" },
        { start: 176, end: 222, root: 43, mode: "minor",     lead: "lead", stoch: 0.14, dist: 0.25, cauchy: true,  label: "dusk (Gm)" },
        { start: 222, end: 272, root: 38, mode: "minor",     lead: "air",  stoch: 0.18, dist: 0.45, cauchy: true,  label: "descent (Dm)" },
        { start: 272, end: 320, root: 34, mode: "altered",   lead: "all",  stoch: 0.22, dist: 0.65, cauchy: true,  label: "rupture (Bb*)" },
        { start: 320, end: 362, root: 38, mode: "minor",     lead: "lead", stoch: 0.15, dist: 0.30, cauchy: false, label: "aftermath (Dm)" },
        { start: 362, end: 400, root: 32, mode: "majorish",  lead: "body", stoch: 0.10, dist: 0.10, cauchy: true,  label: "turn (Ab)" },
        { start: 400, end: 438, root: 34, mode: "majorish",  lead: "air",  stoch: 0.06, dist: 0.0,  cauchy: false, label: "return (Bb)" },
        { start: 438, end: 468, root: 34, mode: "majorish",  lead: "bass", stoch: 0.03, dist: 0.0,  cauchy: false, label: "resolution (Bb)" },
        { start: 468, end: 488, root: 34, mode: "majorish",  lead: "none", stoch: 0.02, dist: 0.0,  cauchy: false, label: "silence" }
      ];

      // Harmonic content derived from region: root + mode determines pitches
      function chiPitches(root, mode) {
        // Derive pitch structures from the root
        if (mode === "majorish") {
          // Overtone-series based: root, fifth, major third, seventh, ninth
          return {
            bass: [root, root + 12],
            body: [root, root + 12, root + 12, root + 19, root + 19, root + 16, root + 24, root + 24],
            air:  [root + 24, root + 28, root + 31, root + 24, root + 28, root + 31],
            lead: [root + 24, root + 31]
          };
        } else if (mode === "minor") {
          // Minor: flat third, perfect fifth, flat seventh
          return {
            bass: [root, root + 12],
            body: [root, root + 12, root + 15, root + 19, root + 19, root + 22, root + 24, root + 27],
            air:  [root + 24, root + 27, root + 31, root + 24, root + 27, root + 31],
            lead: [root + 24, root + 31]
          };
        } else {
          // Altered: cluster of tensions - augmented fifth, minor second, tritone
          return {
            bass: [root, root + 12, root + 13],
            body: [root, root + 13, root + 16, root + 18, root + 20, root + 23, root + 25, root + 27],
            air:  [root + 24, root + 26, root + 30, root + 25, root + 28, root + 32],
            lead: [root + 25, root + 30]
          };
        }
      }

      // Breathing swells: asymmetric, overlapping waves
      // Each swell has a start time, peak, and return
      const CHI_BREATHS = [
        { peak: 28,  width: 38 },   // slow opening breath
        { peak: 62,  width: 28 },   // quicker
        { peak: 102, width: 34 },
        { peak: 148, width: 30 },
        { peak: 195, width: 36 },
        { peak: 245, width: 42 },
        { peak: 294, width: 46 },   // climax breath
        { peak: 340, width: 32 },
        { peak: 380, width: 30 },
        { peak: 418, width: 36 },
        { peak: 452, width: 28 }    // final breath
      ];

      function chiBreathGain(elapsed) {
        // Sum contributions from all breaths using Gaussian-shaped curves
        let g = 0.3;  // baseline
        for (const b of CHI_BREATHS) {
          const dt = (elapsed - b.peak) / b.width;
          g += 0.7 * Math.exp(-dt * dt);
        }
        return Math.min(1.0, g);
      }

      // Voice presence: not all 20 always active
      // Each voice has a presence schedule (when it's active)
      // Presences are shorter than the old version: 20-50 seconds
      const CHI_PRESENCES = [
        // bass voices (0-3)
        { voice: 0, windows: [[0, 60], [380, 488]] },
        { voice: 1, windows: [[30, 95], [220, 275], [420, 488]] },
        { voice: 2, windows: [[50, 130], [280, 340], [440, 488]] },
        { voice: 3, windows: [[80, 160], [330, 400]] },
        // body voices (4-11)
        { voice: 4, windows: [[20, 90], [170, 240], [360, 440]] },
        { voice: 5, windows: [[40, 130], [200, 270], [380, 460]] },
        { voice: 6, windows: [[60, 150], [220, 300], [390, 470]] },
        { voice: 7, windows: [[100, 180], [260, 330], [400, 480]] },
        { voice: 8, windows: [[120, 200], [270, 340], [410, 480]] },
        { voice: 9, windows: [[140, 220], [280, 360]] },
        { voice: 10, windows: [[160, 250], [290, 370], [430, 488]] },
        { voice: 11, windows: [[80, 170], [240, 320], [370, 450]] },
        // air voices (12-17)
        { voice: 12, windows: [[90, 160], [220, 290], [400, 460]] },
        { voice: 13, windows: [[110, 190], [240, 310], [420, 488]] },
        { voice: 14, windows: [[130, 210], [260, 340], [410, 470]] },
        { voice: 15, windows: [[150, 230], [280, 360], [390, 460]] },
        { voice: 16, windows: [[170, 250], [300, 380]] },
        { voice: 17, windows: [[190, 270], [320, 400]] },
        // lead voices (18-19)
        { voice: 18, windows: [[180, 230], [340, 400]] },
        { voice: 19, windows: [[190, 240], [350, 410]] }
      ];

      function chiVoicePresence(voiceIdx, elapsed) {
        const p = CHI_PRESENCES[voiceIdx];
        if (!p) return 0;
        for (const [start, end] of p.windows) {
          if (elapsed >= start - 3 && elapsed <= end + 5) {
            const fadeIn = Math.min(1, Math.max(0, (elapsed - start + 3) / 6));
            const fadeOut = Math.min(1, Math.max(0, (end + 5 - elapsed) / 8));
            return fadeIn * fadeOut;
          }
        }
        return 0;
      }

      // Lead class boost: selected class gets amplitude emphasis
      function chiLeadBoost(voiceIdx, leadClass) {
        const classOf = voiceIdx < 4 ? "bass" : voiceIdx < 12 ? "body" : voiceIdx < 18 ? "air" : "lead";
        if (leadClass === "all") return 1.0;
        if (leadClass === "none") return 0.8;
        if (classOf === leadClass) return 1.4;
        return 0.75;
      }

      const CHI = {
        name: "CHIAROSCURO",
        lpFreq: 5500, sparse: false,
        sections: CHI_REGIONS,
        lerpRegion(elapsed) {
          for (let i = 0; i < CHI_REGIONS.length - 1; i++) {
            if (elapsed < CHI_REGIONS[i+1].start) {
              const t = (elapsed - CHI_REGIONS[i].start) / (CHI_REGIONS[i+1].start - CHI_REGIONS[i].start);
              const a = CHI_REGIONS[i], b = CHI_REGIONS[i+1];
              return {
                t, a, b,
                stoch: lerp(a.stoch, b.stoch, t),
                dist: lerp(a.dist, b.dist, t),
                label: t < 0.5 ? a.label : b.label,
                lead: a.lead,   // lead class switches at boundary
                root: a.root, mode: a.mode   // harmony holds until boundary
              };
            }
          }
          const last = CHI_REGIONS[CHI_REGIONS.length - 1];
          return { t: 1, a: last, b: last, stoch: last.stoch, dist: last.dist, label: last.label, lead: last.lead, root: last.root, mode: last.mode };
        },
        lerpSection(elapsed) {
          // Used by visualizer for label
          const r = this.lerpRegion(elapsed);
          return { label: r.label };
        },
        initVoices() {
          // Initialize with all voices silent; presence schedule will bring them in
          return this._buildParams(0);
        },
        updateVoices(section, elapsed) {
          return this._buildParams(elapsed);
        },
        _buildParams(elapsed) {
          const region = this.lerpRegion(elapsed);
          const pitches = chiPitches(region.root, region.mode);
          const breath = chiBreathGain(elapsed);
          const params = [], st = region.stoch, di = region.dist;

          // 4 bass voices
          [-0.06,0.06,-0.02,0.02].forEach((pan, i) => {
            const hz = midiToHz(pitches.bass[i % pitches.bass.length]);
            const presence = chiVoicePresence(i, elapsed);
            const boost = chiLeadBoost(i, region.lead);
            params.push({
              n:4, fMin:hz*0.95, fMax:hz*1.05, ab:0.85,
              sa:st*0.6, sd:st*0.3, dist:di*0.5,
              saRate:st*0.06, sdRate:st*0.03, saMin:st*0.15, saMax:st*2.0, sdMin:st*0.08, sdMax:st*1.2,
              g: 0.050 * presence * boost * breath, pan
            });
          });

          // 8 body voices
          [-0.30,-0.20,-0.10,-0.03,0.03,0.10,0.20,0.30].forEach((pan, i) => {
            let midi = pitches.body[i % pitches.body.length];
            if (i < 2) midi -= 12; if (i >= 6) midi += 12;
            const hz = midiToHz(midi);
            const presence = chiVoicePresence(4 + i, elapsed);
            const boost = chiLeadBoost(4 + i, region.lead);
            params.push({
              n:8, fMin:hz*0.93, fMax:hz*1.07, ab:0.70,
              sa:st, sd:st*0.5, dist:di,
              saRate:st*0.08, sdRate:st*0.04, saMin:st*0.2, saMax:st*2.5, sdMin:st*0.1, sdMax:st*1.5,
              g: 0.038 * presence * boost * breath, pan
            });
          });

          // 6 air voices
          [-0.38,-0.22,-0.08,0.08,0.22,0.38].forEach((pan, i) => {
            const midi = pitches.air[i % pitches.air.length] + (i > 3 ? 12 : 0);
            const hz = midiToHz(midi);
            const presence = chiVoicePresence(12 + i, elapsed);
            const boost = chiLeadBoost(12 + i, region.lead);
            params.push({
              n:14, fMin:hz*0.90, fMax:hz*1.10, ab:0.45,
              sa:st*1.3, sd:st*0.7, dist:di*1.2,
              saRate:st*0.10, sdRate:st*0.06, saMin:st*0.25, saMax:st*3.0, sdMin:st*0.12, sdMax:st*2.0,
              g: 0.028 * presence * boost * breath, pan
            });
          });

          // 2 lead voices
          [-0.03,0.03].forEach((pan, i) => {
            const midi = pitches.lead[i % pitches.lead.length];
            const hz = midiToHz(midi);
            const presence = chiVoicePresence(18 + i, elapsed);
            const boost = chiLeadBoost(18 + i, region.lead);
            params.push({
              n:6, fMin:hz*0.97, fMax:hz*1.03, ab:0.55,
              sa:st*0.4, sd:st*0.2, dist:di*0.3,
              saRate:st*0.04, sdRate:st*0.02, saMin:st*0.1, saMax:st*1.5, sdMin:st*0.05, sdMax:st*0.8,
              g: 0.022 * presence * boost * breath, pan
            });
          });
          return params;
        },
        scheduleMaster(ac, master) {
          const now = ac.currentTime;
          master.gain.setValueAtTime(0.0001, now);
          master.gain.linearRampToValueAtTime(1.0, now + 4);
          master.gain.setValueAtTime(1.0, now + CHI_DUR - 1);
          master.gain.linearRampToValueAtTime(0.0001, now + CHI_DUR + 12);

          // === MASTERING CHAIN (Chiaroscuro only) ===
          // Reduce reverb send: 0.40 -> 0.22. The 12s tail was muddying
          // harmonic modulations. Less wet = each region's tonal center stays defined.
          if (buses.rvSend) buses.rvSend.gain.setValueAtTime(0.22, now);
          // Brighter reverb tail: 1800 -> 2400Hz lets articulation through
          if (buses.rvLP) buses.rvLP.frequency.setValueAtTime(2400, now);
          // Reduce shimmer: it was adding to the muddiness
          if (buses.shSend) buses.shSend.gain.setValueAtTime(0.06, now);
          if (buses.shGain) buses.shGain.gain.setValueAtTime(0.05, now);
          // More transparent compression: -16 -> -12 threshold, 2.5 -> 2.0 ratio
          // Preserves Cauchy bursts as events rather than squashing them
          if (buses.comp) {
            buses.comp.threshold.setValueAtTime(-12, now);
            buses.comp.ratio.setValueAtTime(2.0, now);
            buses.comp.knee.setValueAtTime(8, now);
            buses.comp.attack.setValueAtTime(0.040, now);
            buses.comp.release.setValueAtTime(0.180, now);
          }
          // BASS CONTROL: tame the rumble that was rattling speakers
          // High-pass at 38Hz removes sub-bass energy below musical content
          // Low-shelf -3dB at 95Hz reduces the bass body without losing foundation
          if (buses.dssHP) buses.dssHP.frequency.setValueAtTime(38, now);
          if (buses.lowShelf) {
            buses.lowShelf.frequency.setValueAtTime(95, now);
            buses.lowShelf.gain.setValueAtTime(-3, now);
          }
          // TILT EQ: +1.5dB air shelf at 8kHz adds perceived clarity ("shimmer")
          // without being harsh; matching -1.5dB low shelf at 300Hz keeps the
          // spectral balance neutral (tilt, not boost).
          if (buses.tiltHigh) buses.tiltHigh.gain.setValueAtTime(1.5, now);
          if (buses.tiltLow)  buses.tiltLow.gain.setValueAtTime(-1.5, now);
          // GENTLER SATURATION: tanh drive 1.4 -> 0.8 for Chiaroscuro's quieter passages.
          // The shared 1.4x curve adds audible harmonic distortion to subtle DSS waveforms;
          // 0.8x preserves the pure stochastic character while still adding warmth.
          if (buses.sat) {
            const gCurve = new Float32Array(1024);
            for (let i = 0; i < 1024; i++) { const x = (i/512)-1; gCurve[i] = Math.tanh(x*2.4); }
            buses.sat.curve = gCurve;
          }
        },
        onUpdate(elapsed, section) {
          // === DYNAMIC MASTERING ===
          const now = ac.currentTime;
          const region = this.lerpRegion(elapsed);

          // OPEN THE SPECTRUM: was 600 + stoch*6000 capped at 5500 (peaked ~1900Hz at climax)
          // Now: base 2800Hz, opens to ~7800Hz at climax. Lead-class aware.
          const intensity = region.stoch / 0.22;  // 0..1
          const leadOpen = region.lead === "air" || region.lead === "all" ? 1200 : 0;
          const filterFreq = 2800 + intensity * 5000 + leadOpen;
          buses.lp.frequency.setTargetAtTime(Math.min(8500, filterFreq), now, 0.6);

          // DYNAMIC REVERB: less wet at climax for definition, more wet in calm regions
          // The piece breathes with reverb - clarity when intense, atmosphere when calm
          if (buses.rvSend) {
            const reverbWet = 0.26 - intensity * 0.10;  // 0.26 calm -> 0.16 climax
            buses.rvSend.gain.setTargetAtTime(reverbWet, now, 0.5);
          }
        }
      };

      // ================================================================
      // INSTRUMENT: ERGODIC
      //
      // 9:37. Durational structure as compositional material. No harmonic
      // center. Time itself is the substance: Fibonacci-adjacent section
      // proportions, density sieves, structural silence, twin eruptions.
      // The stochastic parameters reach extremes no other piece touches.
      // Violence and delicacy coexist through temporal architecture.
      // Form: void -> particle -> accretion -> mass -> eruption ->
      // shatter -> mass -> eruption (maximum) -> dissolution -> dust ->
      // breath -> void. 577 seconds (prime).
      // ================================================================

      const ERG_DUR = 577;

      // 20 voices spanning the full audible spectrum, untethered from
      // harmonic function. Frequency ranges ARE the composition.
      const ERG_VOICES = [
        // Sub-bass (0-2): felt more than heard, ultra-low
        { n:4,  fLo:18,   fHi:45,    ab:0.95, pan: 0.00 },
        { n:4,  fLo:22,   fHi:55,    ab:0.90, pan:-0.04 },
        { n:4,  fLo:20,   fHi:50,    ab:0.92, pan: 0.04 },
        // Low (3-5): bass foundation
        { n:4,  fLo:40,   fHi:200,   ab:0.85, pan:-0.10 },
        { n:4,  fLo:50,   fHi:250,   ab:0.85, pan: 0.10 },
        { n:4,  fLo:35,   fHi:180,   ab:0.88, pan: 0.00 },
        // Mid-low (6-9): body
        { n:8,  fLo:80,   fHi:800,   ab:0.70, pan:-0.25 },
        { n:8,  fLo:100,  fHi:1000,  ab:0.70, pan: 0.25 },
        { n:8,  fLo:90,   fHi:900,   ab:0.72, pan:-0.12 },
        { n:8,  fLo:110,  fHi:1100,  ab:0.68, pan: 0.12 },
        // Mid-high (10-13): texture
        { n:8,  fLo:200,  fHi:2500,  ab:0.60, pan:-0.35 },
        { n:8,  fLo:250,  fHi:3000,  ab:0.58, pan: 0.35 },
        { n:8,  fLo:180,  fHi:2200,  ab:0.62, pan:-0.20 },
        { n:8,  fLo:300,  fHi:3500,  ab:0.55, pan: 0.20 },
        // High (14-17): air and shimmer
        { n:14, fLo:500,  fHi:6000,  ab:0.42, pan:-0.45 },
        { n:14, fLo:600,  fHi:7000,  ab:0.40, pan: 0.45 },
        { n:14, fLo:450,  fHi:5500,  ab:0.44, pan:-0.30 },
        { n:14, fLo:700,  fHi:8000,  ab:0.38, pan: 0.30 },
        // Ultra-high (18-19): particles at the edge of perception
        { n:14, fLo:2000, fHi:14000, ab:0.30, pan:-0.50 },
        { n:14, fLo:2500, fHi:14000, ab:0.28, pan: 0.50 }
      ];

      const ERG = {
        name: "ERGODIC",
        lpFreq: 800, sparse: true,
        voiceDefs: ERG_VOICES,
        // Sections follow Fibonacci-adjacent proportions (34, 55, 68, 110, 178, 233...)
        // fSpread controls frequency range expansion: 0.1 = near-pure, 1.8 = extreme
        sections: [
          { start:0,   end:34,  amp:0.03, flt:200,   noise:0.001,  stoch:0.010, dist:0.0,  fSpread:0.10, density:0.8,  label:"void" },
          { start:34,  end:68,  amp:0.08, flt:400,   noise:0.003,  stoch:0.030, dist:0.0,  fSpread:0.20, density:2.0,  label:"particle" },
          { start:68,  end:110, amp:0.14, flt:600,   noise:0.008,  stoch:0.060, dist:0.05, fSpread:0.40, density:4.5,  label:"accretion" },
          { start:110, end:178, amp:0.30, flt:1200,  noise:0.018,  stoch:0.120, dist:0.15, fSpread:0.70, density:10.0, label:"mass i" },
          { start:178, end:233, amp:0.65, flt:4000,  noise:0.060,  stoch:0.350, dist:0.80, fSpread:1.20, density:18.0, label:"eruption i" },
          { start:233, end:280, amp:0.22, flt:6000,  noise:0.025,  stoch:0.180, dist:0.50, fSpread:1.50, density:6.0,  label:"shatter" },
          { start:280, end:350, amp:0.38, flt:1800,  noise:0.022,  stoch:0.140, dist:0.20, fSpread:0.80, density:12.0, label:"mass ii" },
          { start:350, end:411, amp:0.80, flt:8000,  noise:0.080,  stoch:0.450, dist:1.00, fSpread:1.80, density:20.0, label:"eruption ii" },
          { start:411, end:466, amp:0.18, flt:1000,  noise:0.010,  stoch:0.080, dist:0.10, fSpread:0.50, density:5.0,  label:"dissolution" },
          { start:466, end:521, amp:0.06, flt:3000,  noise:0.004,  stoch:0.040, dist:0.02, fSpread:0.60, density:2.5,  label:"dust" },
          { start:521, end:555, amp:0.02, flt:250,   noise:0.001,  stoch:0.008, dist:0.0,  fSpread:0.15, density:1.0,  label:"breath" },
          { start:555, end:577, amp:0.005,flt:150,   noise:0.0005, stoch:0.005, dist:0.0,  fSpread:0.05, density:0.5,  label:"void ii" }
        ],
        lerpSection(elapsed) {
          const S = this.sections;
          for (let i = 0; i < S.length - 1; i++) {
            if (elapsed < S[i+1].start) {
              const t = (elapsed - S[i].start) / (S[i+1].start - S[i].start);
              const a = S[i], b = S[i+1];
              return {
                amp: lerp(a.amp,b.amp,t), flt: lerp(a.flt,b.flt,t),
                noise: lerp(a.noise,b.noise,t), stoch: lerp(a.stoch,b.stoch,t),
                dist: lerp(a.dist,b.dist,t), fSpread: lerp(a.fSpread,b.fSpread,t),
                density: lerp(a.density,b.density,t),
                label: t<0.5 ? a.label : b.label
              };
            }
          }
          return S[S.length - 1];
        },
        initVoices(section) { return this._buildParams(section); },
        updateVoices(section) { return this._buildParams(section); },
        _buildParams(section) {
          const params = [], st = section.stoch, di = section.dist, fs = section.fSpread;
          ERG_VOICES.forEach((def, idx) => {
            const center = (def.fLo + def.fHi) / 2;
            const halfW  = (def.fHi - def.fLo) / 2;
            const fMin   = Math.max(18, center - halfW * fs);
            const fMax   = Math.max(fMin * 1.5, center + halfW * fs);
            const complexity = def.n <= 4 ? 0.7 : def.n <= 8 ? 1.0 : 1.3;
            params.push({
              n: def.n, fMin, fMax, ab: def.ab,
              sa: st * complexity, sd: st * complexity * 0.5, dist: di * complexity,
              saRate: st * 0.12, sdRate: st * 0.06,
              saMin: st * 0.15, saMax: Math.min(0.8, st * 4.0),
              sdMin: st * 0.08, sdMax: Math.min(0.5, st * 2.5),
              g: voiceGainsCurrent[idx],
              pan: def.pan
            });
          });
          return params;
        },
        scheduleMaster(ac, master) {
          const now = ac.currentTime;
          // Gain envelope sculpted to durational architecture
          master.gain.setValueAtTime(0.0001, now);
          master.gain.linearRampToValueAtTime(0.15, now + 34);     // void -> particle
          master.gain.linearRampToValueAtTime(0.35, now + 68);     // particle -> accretion
          master.gain.linearRampToValueAtTime(0.65, now + 110);    // accretion -> mass i
          master.gain.linearRampToValueAtTime(1.20, now + 178);    // mass i -> eruption i
          master.gain.linearRampToValueAtTime(2.00, now + 210);    // eruption i peak
          master.gain.linearRampToValueAtTime(0.50, now + 245);    // shatter drop
          master.gain.linearRampToValueAtTime(0.45, now + 280);    // shatter sustain
          master.gain.linearRampToValueAtTime(1.00, now + 350);    // mass ii -> eruption ii
          master.gain.linearRampToValueAtTime(2.40, now + 385);    // eruption ii peak (MAXIMUM)
          master.gain.linearRampToValueAtTime(0.30, now + 430);    // dissolution
          master.gain.linearRampToValueAtTime(0.12, now + 466);    // dust
          master.gain.linearRampToValueAtTime(0.05, now + 521);    // breath
          master.gain.linearRampToValueAtTime(0.0001, now + ERG_DUR + 10); // void ii -> silence

          // === MASTERING CHAIN (Ergodic) ===
          // Sub-bass preservation: HP at 25Hz (lower than other pieces)
          if (buses.dssHP) buses.dssHP.frequency.setValueAtTime(25, now);
          // Gentle low-shelf cut to prevent muddiness during eruptions
          if (buses.lowShelf) {
            buses.lowShelf.frequency.setValueAtTime(80, now);
            buses.lowShelf.gain.setValueAtTime(-2, now);
          }
          // Start with generous reverb for the void; onUpdate adjusts dynamically
          if (buses.rvSend) buses.rvSend.gain.setValueAtTime(0.38, now);
          if (buses.rvLP) buses.rvLP.frequency.setValueAtTime(2200, now);
          if (buses.shSend) buses.shSend.gain.setValueAtTime(0.10, now);
          if (buses.shGain) buses.shGain.gain.setValueAtTime(0.07, now);
          // Compression: fast attack to bite transients, high ratio for eruptions
          if (buses.comp) {
            buses.comp.threshold.setValueAtTime(-14, now);
            buses.comp.ratio.setValueAtTime(3.0, now);
            buses.comp.knee.setValueAtTime(6, now);
            buses.comp.attack.setValueAtTime(0.012, now);
            buses.comp.release.setValueAtTime(0.150, now);
          }
          // Moderate saturation: warm but not aggressive at rest
          if (buses.sat) {
            const gCurve = new Float32Array(1024);
            for (let i = 0; i < 1024; i++) { const x = (i/512)-1; gCurve[i] = Math.tanh(x*1.8); }
            buses.sat.curve = gCurve;
          }
          // Neutral tilt EQ at start; onUpdate pushes brightness during eruptions
          if (buses.tiltHigh) buses.tiltHigh.gain.setValueAtTime(0, now);
          if (buses.tiltLow) buses.tiltLow.gain.setValueAtTime(0, now);
        },
        onUpdate(elapsed, section) {
          const now = ac.currentTime;
          // Dynamic filter follows section
          buses.lp.frequency.setTargetAtTime(section.flt, now, 0.3);
          // Dynamic noise layer
          noiseNodes.forEach(n => {
            n.bG.gain.setTargetAtTime(section.noise, now, 0.3);
            n.wG.gain.setTargetAtTime(Math.max(0.0005, section.amp * 0.008), now, 0.3);
            n.bLP.frequency.setTargetAtTime(Math.min(section.flt * 0.4, 800), now, 0.3);
            n.wBP.frequency.setTargetAtTime(Math.min(section.flt * 1.5, 8000), now, 0.3);
          });
          // Intensity scalar: 0 at rest, 1 at maximum eruption
          const intensity = section.stoch / 0.45;
          // Dynamic reverb: ethereal in quiet, dry in violence
          if (buses.rvSend) {
            const reverbWet = 0.38 - intensity * 0.30;
            buses.rvSend.gain.setTargetAtTime(Math.max(0.06, reverbWet), now, 0.4);
          }
          if (buses.rvLP) {
            buses.rvLP.frequency.setTargetAtTime(2200 + intensity * 1800, now, 0.5);
          }
          // Dynamic tilt: brighter during eruptions, warmer during quiet
          if (buses.tiltHigh) buses.tiltHigh.gain.setTargetAtTime(intensity * 3.5, now, 0.5);
          if (buses.tiltLow) buses.tiltLow.gain.setTargetAtTime(-intensity * 2.5, now, 0.5);
          // Dynamic compression: tighter during eruptions
          if (buses.comp) {
            const threshold = -14 + intensity * 4;   // -14 -> -10
            const ratio = 3.0 + intensity * 2.0;     // 3.0 -> 5.0
            buses.comp.threshold.setTargetAtTime(threshold, now, 0.3);
            buses.comp.ratio.setTargetAtTime(ratio, now, 0.3);
          }
        }
      };

      const INSTRUMENTS = { ish: ISH, lem: LEM, gen: GEN, chi: CHI, erg: ERG };

      // ================================================================
      // REVERB + NOISE (shared)
      // ================================================================

      function createIR(ctx) {
        let seed = 1337;
        const rng = () => { seed = (seed*1664525+1013904223)>>>0; return seed/4294967296; };
        const len = Math.floor(ctx.sampleRate * 12);
        const ir = ctx.createBuffer(2, len, ctx.sampleRate);
        for (let ch = 0; ch < 2; ch++) {
          const d = ir.getChannelData(ch); let lp = 0;
          for (let i = 0; i < len; i++) { const env = Math.pow(1-i/len,2.0); lp = lp*0.988 + (rng()*2-1)*0.08; d[i] = lp*env*(ch===0?1:0.96); }
        }
        return ir;
      }

      function createNoiseBuf(ctx, type, seed) {
        const rng = () => { seed = (seed*1664525+1013904223)>>>0; return seed/4294967296; };
        const len = ctx.sampleRate * 4;
        const buf = ctx.createBuffer(1, len, ctx.sampleRate);
        const d = buf.getChannelData(0); let last = 0;
        for (let i = 0; i < len; i++) { const w = rng()*2-1; if (type==="brown"){last=(last+0.02*w)/1.02;d[i]=last*3.2;}else d[i]=w*0.5; }
        return buf;
      }

      // ================================================================
      // AUDIO GRAPH
      // ================================================================

      async function ensureAudio(inst) {
        if (ac) return;
        ac = new (window.AudioContext || window.webkitAudioContext)();
        master = ac.createGain(); master.gain.value = 0.0001;
        analyser = ac.createAnalyser();
        analyser.fftSize = 4096; analyser.smoothingTimeConstant = 0.65;
        analyser.minDecibels = -90; analyser.maxDecibels = -10;

        const lp = ac.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = inst.lpFreq; lp.Q.value = 0.25;
        buses.lp = lp;

        // Bass control nodes (transparent at defaults; only Chiaroscuro adjusts them)
        const dssHP = ac.createBiquadFilter(); dssHP.type = "highpass"; dssHP.frequency.value = 20; dssHP.Q.value = 0.7;
        const lowShelf = ac.createBiquadFilter(); lowShelf.type = "lowshelf"; lowShelf.frequency.value = 100; lowShelf.gain.value = 0;
        buses.dssHP = dssHP; buses.lowShelf = lowShelf;

        const sat = ac.createWaveShaper();
        const curve = new Float32Array(1024);
        for (let i = 0; i < 1024; i++) { const x = (i/512)-1; curve[i] = Math.tanh(x*1.4); }
        sat.curve = curve; sat.oversample = "2x";

        const conv = ac.createConvolver(); conv.buffer = createIR(ac);
        const rvLP = ac.createBiquadFilter(); rvLP.type="lowpass"; rvLP.frequency.value=1800;
        const rvHP = ac.createBiquadFilter(); rvHP.type="highpass"; rvHP.frequency.value=80;
        const rvSend = ac.createGain(); rvSend.gain.value=0.40;

        const shDel = ac.createDelay(3); shDel.delayTime.value=0.45;
        const shFb = ac.createGain(); shFb.gain.value=0.14;
        const shLP = ac.createBiquadFilter(); shLP.type="lowpass"; shLP.frequency.value=2200;
        const shGain = ac.createGain(); shGain.gain.value=0.08;
        const shSend = ac.createGain(); shSend.gain.value=0.12;

        const comp = ac.createDynamicsCompressor();
        comp.threshold.value=-16; comp.knee.value=10; comp.ratio.value=2.5;
        comp.attack.value=0.03; comp.release.value=0.20;

        // Tilt EQ (transparent at default 0dB; CHI activates +1.5/-1.5dB)
        const tiltHigh = ac.createBiquadFilter(); tiltHigh.type = "highshelf"; tiltHigh.frequency.value = 8000; tiltHigh.gain.value = 0;
        const tiltLow  = ac.createBiquadFilter(); tiltLow.type  = "lowshelf";  tiltLow.frequency.value  = 300;  tiltLow.gain.value  = 0;

        // Expose nodes so per-instrument onUpdate can master them
        buses.rvSend = rvSend; buses.shSend = shSend; buses.shGain = shGain;
        buses.rvLP = rvLP; buses.comp = comp; buses.sat = sat;
        buses.tiltHigh = tiltHigh; buses.tiltLow = tiltLow;

        try {
          const blob = new Blob([WORKLET_CODE], { type: "text/javascript" });
          const url = URL.createObjectURL(blob);
          await ac.audioWorklet.addModule(url);
          URL.revokeObjectURL(url);
          dssNode = new AudioWorkletNode(ac, "dss-processor", { outputChannelCount: [2] });
        } catch (e) {
          try {
            await ac.audioWorklet.addModule("data:text/javascript,"+encodeURIComponent(WORKLET_CODE));
            dssNode = new AudioWorkletNode(ac, "dss-processor", { outputChannelCount: [2] });
          } catch (e2) { console.error("AudioWorklet not supported:", e2); return; }
        }

        dssNode.connect(dssHP); dssHP.connect(lowShelf); lowShelf.connect(lp);
        lp.connect(sat); sat.connect(comp);
        sat.connect(rvSend); rvSend.connect(conv); conv.connect(rvLP); rvLP.connect(rvHP); rvHP.connect(comp);
        sat.connect(shSend); shSend.connect(shDel); shDel.connect(shLP); shLP.connect(shGain); shGain.connect(comp);
        shGain.connect(shFb); shFb.connect(shDel);

        const makeup = ac.createGain(); makeup.gain.value = 1.4;
        comp.connect(makeup); makeup.connect(tiltLow); tiltLow.connect(tiltHigh);

        // Mid-side processing: mono-sum sub-bass in the sides.
        // Bass voices are panned slightly off-centre; stereo reverb adds side energy below 100Hz
        // which causes phase incoherence on mono systems. HPF on the side channel removes it.
        const msSplit   = ac.createChannelSplitter(2);
        const msEncML   = ac.createGain(); msEncML.gain.value =  0.5;  // L  ->  mid
        const msEncMR   = ac.createGain(); msEncMR.gain.value =  0.5;  // R  ->  mid
        const msEncSL   = ac.createGain(); msEncSL.gain.value =  0.5;  // L  ->  side
        const msEncSR   = ac.createGain(); msEncSR.gain.value = -0.5;  // R  ->  side (negate)
        const msMid     = ac.createGain(); msMid.gain.value   =  1.0;  // mid  summing node
        const msSide    = ac.createGain(); msSide.gain.value  =  1.0;  // side summing node
        const msSideHPF = ac.createBiquadFilter(); msSideHPF.type = "highpass"; msSideHPF.frequency.value = 100; msSideHPF.Q.value = 0.7;
        const msDecLPos = ac.createGain(); msDecLPos.gain.value =  1.0;  // filtered side  ->  L (add)
        const msDecRNeg = ac.createGain(); msDecRNeg.gain.value = -1.0;  // filtered side  ->  R (subtract)
        const msDecL    = ac.createGain(); msDecL.gain.value   =  1.0;   // L output summing
        const msDecR    = ac.createGain(); msDecR.gain.value   =  1.0;   // R output summing
        const msMerge   = ac.createChannelMerger(2);

        tiltHigh.connect(msSplit);
        msSplit.connect(msEncML, 0); msSplit.connect(msEncMR, 1);  // encode mid
        msSplit.connect(msEncSL, 0); msSplit.connect(msEncSR, 1);  // encode side
        msEncML.connect(msMid);  msEncMR.connect(msMid);           // msMid = (L+R)/2
        msEncSL.connect(msSide); msEncSR.connect(msSide);          // msSide = (L-R)/2
        msSide.connect(msSideHPF);                                  // HPF: remove sub-100Hz from sides
        msMid.connect(msDecL); msSideHPF.connect(msDecLPos); msDecLPos.connect(msDecL);  // L = mid + sideHP
        msMid.connect(msDecR); msSideHPF.connect(msDecRNeg); msDecRNeg.connect(msDecR);  // R = mid - sideHP
        msDecL.connect(msMerge, 0, 0); msDecR.connect(msMerge, 0, 1);  // merge back to stereo

        msMerge.connect(analyser); analyser.connect(master); master.connect(ac.destination);

        if (isMobile && ac.createMediaStreamDestination) {
          try {
            const ms = ac.createMediaStreamDestination(); analyser.connect(ms);
            iosAudioEl = document.createElement("audio"); iosAudioEl.setAttribute("playsinline","");
            iosAudioEl.srcObject = ms.stream; iosAudioEl.play().catch(()=>{});
          } catch (_) {}
        }
        runtimeStops.push(() => { try { dssNode.disconnect(); dssHP.disconnect(); lowShelf.disconnect(); lp.disconnect(); sat.disconnect(); } catch(_){} });
        runtimeStops.push(() => { try { makeup.disconnect(); tiltLow.disconnect(); tiltHigh.disconnect(); msMerge.disconnect(); } catch(_){} });
      }

      function scheduleNoise() {
        const brown = ac.createBufferSource();
        brown.buffer = createNoiseBuf(ac,"brown",2026); brown.loop=true;
        const bLP = ac.createBiquadFilter(); bLP.type="lowpass"; bLP.frequency.value=380;
        const bHP = ac.createBiquadFilter(); bHP.type="highpass"; bHP.frequency.value=50;
        const bG = ac.createGain(); bG.gain.value=0.008;
        brown.connect(bLP).connect(bHP).connect(bG).connect(buses.lp); brown.start();
        const white = ac.createBufferSource();
        white.buffer = createNoiseBuf(ac,"white",4040); white.loop=true;
        const wBP = ac.createBiquadFilter(); wBP.type="bandpass"; wBP.frequency.value=1500; wBP.Q.value=0.5;
        const wG = ac.createGain(); wG.gain.value=0.0012;
        white.connect(wBP).connect(wG).connect(buses.lp); white.start();
        noiseNodes.push({ bG, wG, wBP, bLP });
        runtimeStops.push(() => { try { brown.stop(); white.stop(); } catch(_){} });
      }

      // ================================================================
      // UPDATER (with sparse voice management for GEN)
      // ================================================================

      function startUpdater() {
        updateInterval = setInterval(() => {
          if (!playing || !ac || !dssNode || !currentInst) return;
          const inst = INSTRUMENTS[currentInst];
          const dur = currentInst === "chi" ? CHI_DUR : currentInst === "erg" ? ERG_DUR : DUR;
          const elapsed = ac.currentTime - startedAt;
          if (elapsed >= dur + 12) { stop(); return; }
          if (elapsed >= dur) return;

          const section = inst.lerpSection(elapsed);

          // Sparse voice management (Gendy c2 only)
          if (inst.sparse) {
            const target = section.density;
            const current = activeVoices.size;
            if (current < Math.ceil(target) && Math.random() < 0.12) {
              const inactive = [];
              for (let i = 0; i < NV; i++) if (!activeVoices.has(i)) inactive.push(i);
              if (inactive.length > 0) activeVoices.add(inactive[Math.floor(Math.random() * inactive.length)]);
            }
            if (current > target + 0.5 && Math.random() < 0.08) {
              const active = Array.from(activeVoices);
              if (active.length > 1) activeVoices.delete(active[Math.floor(Math.random() * active.length)]);
            }
            if (current >= 2 && Math.random() < 0.015) {
              const active = Array.from(activeVoices);
              const inactive = [];
              for (let i = 0; i < NV; i++) if (!activeVoices.has(i)) inactive.push(i);
              if (inactive.length > 0) {
                activeVoices.delete(active[Math.floor(Math.random() * active.length)]);
                activeVoices.add(inactive[Math.floor(Math.random() * inactive.length)]);
              }
            }
            for (let i = 0; i < NV; i++) {
              const vDefs = inst.voiceDefs || SHARED_VOICES;
              const tg = activeVoices.has(i) ? baseGain(vDefs[i].n) : 0.0001;
              voiceGainsCurrent[i] += (tg - voiceGainsCurrent[i]) * 0.12;
            }
          }

          const voices = inst.updateVoices(section, elapsed);
          dssNode.port.postMessage({ type: "update", updates: voices });
          inst.onUpdate(elapsed, section);
        }, 200);
      }

      // ================================================================
      // VISUALIZER
      // ================================================================

      // Helper used only by the visualizer: update overlay text without drawing
      function _vUpdateText() {
        if (playing && ac && currentInst) {
          const inst = INSTRUMENTS[currentInst];
          const dur = currentInst === "chi" ? CHI_DUR : currentInst === "erg" ? ERG_DUR : DUR;
          const el = clamp(ac.currentTime - startedAt, 0, dur + 12);
          timeEl.textContent = fmt(Math.min(el, dur));
          if (el >= dur) { phaseEl.textContent = "silence"; statusEl.textContent = "fading"; }
          else { phaseEl.textContent = inst.lerpSection(el).label; statusEl.textContent = "playing"; }
        }
      }

      function drawViz(ts) {
        requestAnimationFrame(drawViz);

        // dt-based clock (stable across refresh rates, pauses cleanly when tab hidden)
        const now = ts || performance.now();
        const dt = _vLastTs ? Math.min(0.05, (now - _vLastTs) / 1000) : 1/60;
        _vLastTs = now;
        _vt += dt;

        const w = canvas.width, h = canvas.height;
        const cy = h * 0.5;

        // Soft persistent trail. Slightly slower decay than original so delicate
        // strokes accumulate into a feathery field instead of disappearing instantly.
        cx.fillStyle = "rgba(0,0,0,0.085)";
        cx.fillRect(0, 0, w, h);

        if (!analyser) { _vUpdateText(); return; }

        // Reuse buffers across frames (avoids per-frame Uint8Array allocation)
        if (!_vFreq || _vFreq.length !== analyser.frequencyBinCount) {
          _vFreq = new Uint8Array(analyser.frequencyBinCount);
          _vTime = new Uint8Array(analyser.frequencyBinCount);
        }
        analyser.getByteFrequencyData(_vFreq);
        analyser.getByteTimeDomainData(_vTime);

        const N = _vFreq.length, T = _vTime.length;

        // ---- Energy bands (smoothed) ----
        const bassEnd = Math.max(4, Math.floor(N * 0.04));
        const midEnd  = Math.floor(N * 0.30);
        let bs = 0, ms = 0, hs = 0;
        for (let i = 0; i < bassEnd; i++) bs += _vFreq[i];
        for (let i = bassEnd; i < midEnd; i++) ms += _vFreq[i];
        // sample high band sparsely (it's the largest range)
        const hiStride = 4;
        let hCount = 0;
        for (let i = midEnd; i < N; i += hiStride) { hs += _vFreq[i]; hCount++; }
        const bN = bs / bassEnd / 255;
        const mN = ms / Math.max(1, (midEnd - bassEnd)) / 255;
        const hN = hs / Math.max(1, hCount) / 255;
        // slow attack, slow release for organic feel
        _vBass   = _vBass   * 0.78 + bN * 0.22;
        _vMid    = _vMid    * 0.78 + mN * 0.22;
        _vHigh   = _vHigh   * 0.85 + hN * 0.15;
        _vEnergy = _vEnergy * 0.80 + ((bN + mN + hN) / 3) * 0.20;

        // Focal point of the wave-packet — drifts slowly. On portrait/narrow
        // viewports it sits a bit further right so the rightward fan doesn't crowd.
        const isPortrait = h > w;
        const baseFx = isPortrait ? 0.30 : 0.20;
        const fxDrift = Math.sin(_vt * 0.13) * 0.018 + Math.sin(_vt * 0.071 + 1.2) * 0.012;
        const focusX = w * (baseFx + fxDrift);
        const focusY = cy + Math.sin(_vt * 0.09) * h * 0.008;
        const span = w - focusX;

        // Shared decay envelope used by every curve. Peaks at focusX, fades right.
        // Returns 0..1 given a normalized distance d (0 at focus, 1 at right edge).
        // Two-term form gives the "near-field bloom + long tail" look of image 2.
        const env = (d) => Math.exp(-d * d * 2.4) * (0.55 + 0.45 * Math.exp(-d * 1.4));

        // ============================================================
        // LAYER A — Stippled cluster around the focal point
        // Vertical "column" rendering creates the visible streaks that
        // appear within the dense burst in the reference image.
        // ============================================================
        cx.fillStyle = "#fff";

        const numCols   = isMobile ? 18 : 32;
        const clusterW  = w * (isPortrait ? 0.30 : 0.22);
        for (let c = 0; c < numCols; c++) {
          const seed = c / (numCols - 1 || 1);
          // Slowly oscillating column position — keeps streaks visible but alive
          const colX = focusX + (seed - 0.5) * clusterW
                              + Math.sin(_vt * 0.42 + c * 1.73) * w * 0.005;
          // Each column draws intensity from a low/low-mid frequency bin
          const binIdx = Math.min(N - 1, Math.floor(2 + seed * bassEnd * 3.2));
          const intensity = (_vFreq[binIdx] || 0) / 255;
          if (intensity < 0.04) continue;

          const dotsInCol = isMobile
            ? (8  + (intensity * 28) | 0)
            : (15 + (intensity * 55) | 0);
          const colSpread = h * 0.26 * (0.42 + intensity * 0.72);

          for (let d = 0; d < dotsInCol; d++) {
            // Triangular distribution → denser near the centerline
            const u  = (Math.random() + Math.random()) - 1;
            const py = focusY + u * colSpread;
            const px = colX + (Math.random() - 0.5) * 1.6;
            cx.globalAlpha = (0.05 + intensity * 0.30) * (0.30 + 0.70 * Math.random());
            cx.fillRect(px, py, 1, 1);
          }
        }

        // A handful of taller, sparser vertical "spikes" inside the cluster.
        // These are the prominent dark vertical streaks visible in image 2.
        const spikes = isMobile ? 4 : 8;
        for (let c = 0; c < spikes; c++) {
          const colX = focusX + (Math.random() - 0.5) * clusterW * 0.95;
          const binIdx = (Math.random() * bassEnd * 3.5) | 0;
          const peak = (_vFreq[binIdx] || 0) / 255;
          if (peak < 0.18) continue;
          const sh = peak * h * 0.42;
          cx.globalAlpha = peak * 0.13;
          cx.fillRect(colX, focusY - sh / 2, 0.6, sh);
        }

        // ============================================================
        // LAYER B — Harmonic wave fan (the heart of image-2's look)
        // The same time-domain waveform is rendered as MANY translucent
        // dotted curves with slightly different amplitudes, vertical
        // offsets, and phase shifts. Layered together they form the
        // characteristic feathery overlapping sinusoids.
        // ============================================================
        const numLayers    = isMobile ? 8 : 13;
        const sampleStride = isMobile ? 6 : 3;

        for (let layer = 0; layer < numLayers; layer++) {
          const lt = layer / (numLayers - 1 || 1);                    // 0..1
          const ampScale  = h * (0.18 + lt * 0.16);                   // outer layers a bit taller
          const yOff      = (lt - 0.5) * 7;                           // gentle vertical fan
          // Time-evolving phase shift gives each curve its own life
          const phaseShift = ((layer * 11) + Math.sin(_vt * 0.5 + layer * 0.9) * 6) | 0;
          const baseAlpha  = (0.10 - lt * 0.055) * (0.45 + _vEnergy * 0.55);

          cx.fillStyle = "#fff";
          for (let i = 0; i < T; i += sampleStride) {
            const xFrac = i / T;
            const x = focusX + xFrac * span * 1.02;
            if (x > w + 2) break;
            const idx = (i + phaseShift) % T;
            const v   = (_vTime[idx] - 128) / 128;
            const d   = xFrac;            // 0 at focus → 1 at right edge
            const e   = env(d);
            const y   = focusY + yOff + v * ampScale * e;
            const a   = baseAlpha * (0.30 + e * 0.70);
            if (a < 0.005) continue;
            cx.globalAlpha = a;
            cx.fillRect(x, y, 1, 1);
          }
        }

        // ============================================================
        // LAYER C — Crisp primary trace
        // A single thin solid stroke of the actual time-domain waveform,
        // very low alpha. Provides a coherent "anchor" reading among the
        // diffuse stipple, like a fine pen line through a wash.
        // ============================================================
        cx.beginPath();
        let started = false;
        for (let i = 0; i < T; i += 2) {
          const xFrac = i / T;
          const x = focusX + xFrac * span * 1.02;
          if (x > w) break;
          const v = (_vTime[i] - 128) / 128;
          const e = env(xFrac);
          const y = focusY + v * h * 0.16 * e;
          if (!started) { cx.moveTo(x, y); started = true; }
          else cx.lineTo(x, y);
        }
        cx.globalAlpha = 0.10 + _vEnergy * 0.16;
        cx.strokeStyle = "#fff";
        cx.lineWidth = 0.6;
        cx.stroke();

        // ============================================================
        // LAYER D — Shoulder waves
        // Two extra-faint mirror traces above and below the main fan,
        // shifted further so the field has a soft "halo" to breathe in.
        // ============================================================
        for (let s = 0; s < 2; s++) {
          const dir = s === 0 ? -1 : 1;
          const off = dir * (10 + Math.sin(_vt * 0.21 + s) * 4);
          const phase = ((s * 47) + Math.sin(_vt * 0.33 + s * 1.7) * 8) | 0;
          cx.beginPath();
          let st = false;
          const stride = isMobile ? 6 : 3;
          for (let i = 0; i < T; i += stride) {
            const xFrac = i / T;
            const x = focusX + xFrac * span * 1.02;
            if (x > w) break;
            const v = (_vTime[(i + phase) % T] - 128) / 128;
            const e = env(xFrac);
            const y = focusY + off + v * h * 0.12 * e;
            if (!st) { cx.moveTo(x, y); st = true; }
            else cx.lineTo(x, y);
          }
          cx.globalAlpha = 0.05 + _vMid * 0.07;
          cx.strokeStyle = "#fff";
          cx.lineWidth = 0.5;
          cx.stroke();
        }

        // ============================================================
        // LAYER E — High-frequency mist
        // Sparse single-pixel grains scattered across the field, driven
        // by the upper spectrum. Adds quiet "shimmer" without weight.
        // ============================================================
        const mistCount = isMobile ? 22 : 60;
        cx.fillStyle = "#fff";
        for (let i = 0; i < mistCount; i++) {
          const bin = midEnd + ((Math.random() * (N - midEnd)) | 0);
          const v = _vFreq[bin] / 255;
          if (v < 0.07) continue;
          const px = Math.random() * w;
          // Bias mist vertically toward the centerline (gentle gaussian-ish)
          const u = (Math.random() + Math.random() + Math.random() - 1.5);
          const py = cy + u * h * 0.42;
          cx.globalAlpha = v * 0.14;
          cx.fillRect(px, py, 1, 1);
        }

        // ============================================================
        // LAYER F — Whisper of a horizon
        // A barely-there centerline that holds the composition together
        // when the audio is very quiet, so the screen never reads as empty.
        // ============================================================
        cx.globalAlpha = 0.025 + _vEnergy * 0.02;
        cx.fillStyle = "#fff";
        cx.fillRect(focusX, cy, w - focusX, 0.5);

        cx.globalAlpha = 1;

        _vUpdateText();
      }

      // ================================================================
      // TRANSPORT
      // ================================================================

      function cleanup() {
        runtimeStops.forEach(fn => fn()); runtimeStops = []; noiseNodes = [];
        if (updateInterval) { clearInterval(updateInterval); updateInterval = null; }
      }

      function forceClose() {
        if (stopTimeout) { clearTimeout(stopTimeout); stopTimeout = null; }
        cleanup();
        if (dssNode) { try { dssNode.port.postMessage({ type: "clear" }); } catch(_){} }
        if (iosAudioEl) { try { iosAudioEl.pause(); iosAudioEl.srcObject = null; } catch(_){} iosAudioEl = null; }
        if (ac) { try { ac.close(); } catch(_){} }
        ac = null; master = null; analyser = null; dssNode = null; buses = {};
        playing = false; stopping = false;
      }

      function showChooser() {
        chooserEl.classList.remove("hidden");
        overlayEl.classList.remove("visible");
        hintEl.classList.remove("visible");
        phaseEl.textContent = "idle"; timeEl.textContent = "00:00";
        currentInst = null;
      }

      async function play(instKey) {
        if (stopping || ac) forceClose();
        const inst = INSTRUMENTS[instKey];
        currentInst = instKey;
        titleEl.innerHTML = inst.name;

        await ensureAudio(inst);
        if (!dssNode) return;
        await ac.resume();

        // Sparse instruments start with one random voice
        if (inst.sparse) {
          activeVoices = new Set();
          voiceGainsCurrent = new Float32Array(NV);
          const first = Math.floor(Math.random() * NV);
          activeVoices.add(first);
          voiceGainsCurrent[first] = baseGain((inst.voiceDefs || SHARED_VOICES)[first].n);
        }

        const section0 = inst.sections[0];
        dssNode.port.postMessage({ type: "init", voices: inst.initVoices(section0) });
        scheduleNoise();
        inst.scheduleMaster(ac, master);
        startUpdater();

        startedAt = ac.currentTime; playing = true; stopping = false;
        chooserEl.classList.add("hidden");
        overlayEl.classList.add("visible");
        hintEl.classList.add("visible");
        setTimeout(() => hintEl.classList.remove("visible"), 3000);
        if (!vizStarted) { vizStarted = true; drawViz(); }
      }

      async function stop() {
        if (!ac || stopping) return;
        playing = false; stopping = true;
        statusEl.textContent = "stopping";
        if (currentInst === "chi" || currentInst === "erg") { try { master.gain.setValueAtTime(0.0001, ac.currentTime); } catch (_) {} }
        cleanup();
        try {
          const now = ac.currentTime;
          master.gain.cancelScheduledValues(now);
          master.gain.setValueAtTime(master.gain.value, now);
          master.gain.linearRampToValueAtTime(0.0001, now + 4);
        } catch (_) {}
        stopTimeout = setTimeout(() => {
          if (dssNode) { try { dssNode.port.postMessage({ type: "clear" }); } catch(_){} }
          if (iosAudioEl) { try { iosAudioEl.pause(); iosAudioEl.srcObject = null; } catch(_){} iosAudioEl = null; }
          if (ac) { try { ac.close(); } catch(_){} }
          ac = null; master = null; analyser = null; dssNode = null; buses = {};
          stopping = false; stopTimeout = null;
          showChooser();
        }, 4500);
      }

      // ================================================================
      // EVENT HANDLERS
      // ================================================================

      chooserEl.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-inst]");
        if (btn) play(btn.dataset.inst);
      });
      canvas.addEventListener("pointerdown", () => { if (playing && !stopping) stop(); });
      setInterval(() => { if (ac && playing && ac.state === "suspended") ac.resume(); }, 500);
      document.addEventListener("visibilitychange", () => { if (!document.hidden && ac && playing && ac.state === "suspended") ac.resume(); });
      document.addEventListener("touchstart", () => { if (ac && playing && ac.state === "suspended") ac.resume(); }, { passive: true });

    })();
  </script>
</body>
</html>
