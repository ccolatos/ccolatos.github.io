function buildP(id){const p=PR[id];const tb=TPB(p.ts[0],p.ts[1]);const tot=p.bars*tb;const chs=p.ch.map(c=>{const ev={};const pat=c.p||[];const notes=c.n||[];const pl=Math.max(pat.length,notes.length,1);const t16=Math.floor(tot/16);for(let i=0;i<t16;i++){const vel=pat.length?pat[i%pl]:0;const note=notes.length?(notes[i%notes.length]||''):'';if(vel>0||note)ev[i*16]={vel:vel||0.8,note};}return{variant:c.v||0,vol:c.vol,events:ev};});if(p.drills)p.drills.forEach(d=>{for(let i=0;i<d.count;i++){const tk=d.start+i*d.step;if(tk<tot)chs[d.ch].events[tk]={vel:d.vel,note:d.note||''};}});return{...p,channels:chs};}

// Draggable slider component
function Slider({value,min,max,color,onChange,width=60,label,onLabelClick,labelActive}){
  const ref=useRef(null),dragging=useRef(false);
  const pct=((value-min)/(max-min))*100;
  const calc=e=>{const r=ref.current.getBoundingClientRect();return Math.round(min+(max-min)*Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)));};
  useEffect(()=>{const mv=e=>{if(dragging.current)onChange(calc(e));};const up=()=>{dragging.current=false;};const tm=e=>{if(dragging.current){const t=e.touches[0];onChange(Math.round(min+(max-min)*Math.max(0,Math.min(1,(t.clientX-ref.current.getBoundingClientRect().left)/ref.current.getBoundingClientRect().width))));}};const te=()=>{dragging.current=false;};window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);window.addEventListener('touchmove',tm,{passive:false});window.addEventListener('touchend',te);return()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);window.removeEventListener('touchmove',tm);window.removeEventListener('touchend',te);};},[min,max,onChange]);
  const labelEl=label&&(onLabelClick?
    <button onClick={onLabelClick} className={labelActive?'mute-flash':''} style={{color:labelActive?'#fff':`var(--sl-c,${color})`,background:labelActive?color:'transparent',border:`1px solid ${color}66`,fontWeight:700,fontSize:'var(--sl-fs,8px)',letterSpacing:1,minWidth:32,padding:'2px 4px',borderRadius:3,cursor:'pointer',fontFamily:'inherit',display:'inline-block'}}>{label}</button>
    :<span style={{color:`var(--sl-c,${color})`,fontWeight:700,fontSize:'var(--sl-fs,8px)',letterSpacing:1,minWidth:32,display:'inline-block'}}>{label}</span>);
  return(<div style={{display:'flex',alignItems:'center',gap:4}}>
    {labelEl}
    <div ref={ref} onMouseDown={e=>{dragging.current=true;onChange(calc(e));}} onTouchStart={e=>{e.preventDefault();dragging.current=true;const t=e.touches[0];const r=ref.current.getBoundingClientRect();onChange(Math.round(min+(max-min)*Math.max(0,Math.min(1,(t.clientX-r.left)/r.width))));}} style={{width,height:8,background:'var(--sl-track,#0e1220)',borderRadius:4,cursor:'pointer',position:'relative',flexShrink:0}}>
      <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${pct}%`,background:`var(--sl-fill,linear-gradient(90deg,${color}55,${color}))`,borderRadius:4,transition:dragging.current?'none':'width 0.05s'}}/>
      <div style={{position:'absolute',top:-2,width:12,height:12,borderRadius:'var(--sl-r,6px)',background:`var(--sl-handle,${color})`,border:'var(--sl-brd,2px solid #060810)',left:`calc(${pct}% - 6px)`,boxShadow:`var(--sl-glow,0 0 6px ${color}44)`,transition:dragging.current?'none':'left 0.05s'}}/>
    </div>
    <span style={{fontSize:'var(--sl-fs,8px)',color:'var(--sl-val,#667)',minWidth:22,textAlign:'right'}}>{value}</span>
  </div>);
}

  const applyRange=useCallback((ci,from,to)=>{const lo=Math.min(from,to),hi=Math.max(from,to);setChs(prev=>{const next=[...prev];const ch={...next[ci],events:{...next[ci].events}};for(let r=lo;r<=hi;r++){const tp=r*cT;if(paintAct.current==='add'){const cur=ch.events[tp];ch.events[tp]={...(cur||{}),vel:velR.current,note:CH[ci].drum?'':pnR.current};}else delete ch.events[tp];}next[ci]=ch;cR.current=next;if(vaR.current){const vs=[...vaR.current];vs[avR.current]={...vs[avR.current],chs:next};vaR.current=vs;setVariants(vs);}return next;});},[cT]);

  const cellDown=useCallback((ci,cellIdx,e)=>{e.preventDefault();const tp=cellIdx*cT;
    if(!CH[ci].drum){const ch=cR.current[ci];if(ch.events[tp]){paintAct.current='remove';isPaint.current=true;paintCh_.current=ci;lastPCell.current=cellIdx;applyP(ci,cellIdx);}else if(e.shiftKey){setEN({ch:ci,cell:cellIdx});}else{paintAct.current='add';isPaint.current=true;paintCh_.current=ci;lastPCell.current=cellIdx;applyP(ci,cellIdx);}return;}
    const ch=cR.current[ci];paintAct.current=ch.events[tp]?'remove':'add';isPaint.current=true;paintCh_.current=ci;lastPCell.current=cellIdx;applyP(ci,cellIdx);},[cT,applyP]);

  const cellEnter=useCallback((ci,cellIdx)=>{if(!isPaint.current||paintCh_.current!==ci)return;
    const last=lastPCell.current;if(last>=0&&last!==cellIdx){applyRange(ci,last,cellIdx);}else{applyP(ci,cellIdx);}lastPCell.current=cellIdx;},[applyP,applyRange]);

  useEffect(()=>{const up=()=>{isPaint.current=false;paintCh_.current=-1;lastPCell.current=-1;};window.addEventListener('mouseup',up);return()=>window.removeEventListener('mouseup',up);},[]);
  const placeNote=useCallback((ci,cellIdx,note)=>{setPaintNote(note);pnR.current=note;paintAct.current='add';isPaint.current=true;paintCh_.current=ci;lastPCell.current=cellIdx;const tp=cellIdx*cT;setChs(prev=>{const next=[...prev];const ch={...next[ci],events:{...next[ci].events}};const cur=ch.events[tp];ch.events[tp]={...(cur||{}),vel:velR.current,note};next[ci]=ch;cR.current=next;if(vaR.current){const vs=[...vaR.current];vs[avR.current]={...vs[avR.current],chs:next};vaR.current=vs;setVariants(vs);}return next;});setEN(null);},[cT]);
  // Clear the variants system (used by preset load and clearAll).
  const clearVariants=useCallback(()=>{vaR.current=null;setVariants(null);avR.current=0;setActiveVar(0);baR.current=[];setBarAssign([]);},[]);
  // Edit a single cell event. `patch` merges over existing event; _delete:true removes. Auto-creates if empty (except when deleting).
  const updateCell=useCallback((ci,tp,patch)=>{setChs(prev=>{const next=[...prev];const ch={...next[ci],events:{...next[ci].events}};const cur=ch.events[tp];if(patch._delete){if(cur)delete ch.events[tp];else return prev;}else if(cur){ch.events[tp]={...cur,...patch};}else{ch.events[tp]={vel:velR.current,note:CH[ci].drum?'':pnR.current,...patch};}next[ci]=ch;cR.current=next;if(vaR.current){const vs=[...vaR.current];vs[avR.current]={...vs[avR.current],chs:next};vaR.current=vs;setVariants(vs);}return next;});},[]);
  // Capture current pattern state as a new variant slot (A/B/C/D). Variants store ONLY pattern data (channel events) — mixer/synths/mutes/solos remain global across variants. First capture splits bars 50/50 between A and B so the feature is audible immediately.
  const captureVar=useCallback(()=>{const snap=()=>({chs:cR.current.map(ch=>({...ch,events:{...ch.events}}))});if(!vaR.current){const a=snap();const b=snap();const vs=[a,b];vaR.current=vs;setVariants(vs);const half=Math.max(1,Math.floor(bsR.current/2));const ba=Array(bsR.current).fill(0).map((_,i)=>i<half?0:1);baR.current=ba;setBarAssign(ba);avR.current=1;setActiveVar(1);}else if(vaR.current.length<4){const vs=[...vaR.current,snap()];vaR.current=vs;setVariants(vs);avR.current=vs.length-1;setActiveVar(vs.length-1);}},[]);
  // Switch which variant is displayed/edited on the grid. Only swaps the pattern; session-level settings are preserved.
  const switchVar=useCallback((idx)=>{if(!vaR.current||idx<0||idx>=vaR.current.length)return;setActiveVar(idx);avR.current=idx;const v=vaR.current[idx];setChs(v.chs);cR.current=v.chs;},[]);
  // Cycle a bar's variant assignment through A→B→C→D→A (only through captured variants).
  const cycleBar=useCallback((barI)=>{if(!vaR.current)return;const ba=[...baR.current];const nv=((ba[barI]||0)+1)%vaR.current.length;ba[barI]=nv;baR.current=ba;setBarAssign(ba);},[]);
  const togM=i=>{setMutes(p=>{const n=[...p];n[i]=!n[i];mR.current=n;return n;});};
  const togS=i=>{setSolos(p=>{const n=[...p];n[i]=!n[i];soR.current=n;return n;});};
  const setVa=(ci,vi)=>{setVars(p=>{const n=[...p];n[ci]=vi;vrR.current=n;return n;});setSV(null);};
  const toggleMute=useCallback(()=>{setMuted(m=>{const nm=!m;if(eR.current)eR.current.sM(nm?0:mV);return nm;});},[mV]);
  const updV=(i,v)=>{setVols(p=>{const n=[...p];n[i]=v;return n;});eR.current?.sCV(i,v);setChs(prev=>{const n=[...prev];n[i]={...n[i],vol:v};cR.current=n;return n;});};
  useEffect(()=>{if(playing&&curTick>=0&&gsR.current){const cr=Math.floor(curTick/cT);const vh=gsR.current.clientHeight;gsR.current.scrollTop=cr*RH-vh/2+RH/2;}},[curTick,playing,cT]);
  // Resize barAssign when bars count changes (preserves existing assignments where possible).
  useEffect(()=>{if(vaR.current&&baR.current.length!==bars){const ba=Array(bars).fill(0).map((_,i)=>baR.current[i]!==undefined?baR.current[i]:0);baR.current=ba;setBarAssign(ba);}},[bars]);
  // Spacebar play/stop
  useEffect(()=>{const h=e=>{if(e.code==='Space'&&!eN&&!sV&&!cellEd&&!showHelp&&e.target.tagName!=='INPUT'&&e.target.tagName!=='SELECT'){e.preventDefault();if(pR.current)stopP();else startP();}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[startP,stopP,eN,sV,cellEd,showHelp]);
  const setVelW=v=>{setVel(v);velR.current=v;};

  const allPresets=[...Object.entries(PR),['custom',{name:'Custom'}]];

  return(
    <div style={{background:'var(--bg)',color:'var(--fg)',fontFamily:'var(--font)',height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{display:'flex',flexDirection:'column',height:'100%',padding:'6px 12px'}}>
        {/* HEADER */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:6,marginBottom:6,borderBottom:'var(--hdr-brd)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0}}>
            <h1 style={{margin:0,fontSize:retro?22:(wW<500?14:17),fontWeight:800,fontFamily:'var(--fontD)',letterSpacing:retro?5:(wW<500?2:5),background:'var(--accG)',backgroundClip:'text',WebkitBackgroundClip:'text',color:'transparent',WebkitTextFillColor:'transparent'}}>NEUROTRKR</h1>
            {init&&<button onClick={()=>setShowHelp(true)} title="Reference: features, shortcuts, MIDI routing" style={{background:'transparent',border:`1px solid ${retro?'#888':'#00ff8855'}`,color:retro?'#000':'var(--acc)',width:retro?22:20,height:retro?22:20,padding:0,fontSize:retro?15:12,fontWeight:700,fontFamily:'inherit',cursor:'pointer',borderRadius:retro?0:'50%',display:'flex',alignItems:'center',justifyContent:'center',letterSpacing:0,lineHeight:1,flexShrink:0}}>?</button>}
          </div>
          {!init?<button onClick={initA} style={{background:'var(--accB)',color:'#000',border:'none',padding:'7px 24px',fontSize:retro?16:12,fontWeight:700,letterSpacing:3,cursor:'pointer',fontFamily:'var(--fontD)',borderRadius:'var(--r)',display:'flex',alignItems:'center',gap:4}}><svg viewBox="0 0 10 12" width="10" height="12" fill="currentColor"><path d="M0 0L10 6L0 12z"/></svg>START</button>
          :<div style={{display:'flex',gap:3,alignItems:'center'}}>
            <button onClick={playing?stopP:startP} style={{background:playing?'var(--stop)':'var(--acc)',color:'#000',border:'none',padding:'6px 12px',fontSize:retro?15:11,fontWeight:700,letterSpacing:1,cursor:'pointer',fontFamily:'inherit',borderRadius:'var(--r)',display:'flex',alignItems:'center',gap:3}}>{playing?<><span>&#9632;</span> STOP</>:<><svg viewBox="0 0 10 12" width="9" height="11" fill="currentColor"><path d="M0 0L10 6L0 12z"/></svg>PLAY</>}</button>
            <button onClick={clearAll} style={{background:'transparent',border:`1px solid ${retro?'#cc220044':'#ff2d4044'}`,color:'var(--stop)',padding:'5px 6px',fontSize:retro?13:9,fontWeight:700,cursor:'pointer',fontFamily:'inherit',borderRadius:'var(--r)',letterSpacing:1}}>CLEAR</button>
            <button onClick={()=>setShowMix(!showMix)} style={{background:showMix?'var(--btn)':'transparent',border:`1px solid ${showMix?'var(--acc)44':'var(--brd)'}`,color:showMix?'var(--acc)':'var(--dim2)',padding:'5px 6px',fontSize:retro?13:9,fontWeight:700,cursor:'pointer',fontFamily:'inherit',borderRadius:'var(--r)',letterSpacing:1}}>MIXER</button>

          </div>}
        </div>
        {/* PRESETS */}
        <div style={{display:'flex',gap:6,marginBottom:6,flexShrink:0,flexWrap:'wrap',alignItems:'center'}}>
          {allPresets.filter(([id])=>id!=='custom').map(([id,p])=><button key={id} onClick={()=>loadP(id)} style={{background:preset===id?'var(--sel-bg)':'transparent',border:`1px solid ${preset===id?'var(--sel-brd)':'var(--brd)'}`,color:preset===id?'var(--sel-c)':'var(--dim3)',padding:'5px 10px',fontSize:retro?14:10,cursor:'pointer',fontFamily:'inherit',letterSpacing:1,borderRadius:'var(--r)',fontWeight:preset===id?700:400}}>{p.name}</button>)}
          <select value={preset.startsWith('beat:')?preset.slice(5):''} onChange={e=>{if(e.target.value!=='')loadBeat(+e.target.value);}} style={{background:preset.startsWith('beat:')?'var(--sel-bg)':'transparent',border:`1px solid ${preset.startsWith('beat:')?'var(--sel-brd)':'var(--brd)'}`,color:preset.startsWith('beat:')?'var(--sel-c)':'var(--dim3)',padding:'5px 6px',fontSize:retro?14:10,cursor:'pointer',fontFamily:'inherit',letterSpacing:1,borderRadius:'var(--r)',fontWeight:preset.startsWith('beat:')?700:400,maxWidth:120}}>

            {(()=>{const groups={};BEATS.forEach((b,i)=>{(groups[b[1]]=groups[b[1]]||[]).push([i,b[0]]);});return Object.keys(groups).map(g=><optgroup key={g} label={g}>{groups[g].map(([i,n])=><option key={i} value={i}>{n}</option>)}</optgroup>);})()}
          </select>
          <button key="custom" onClick={()=>loadP('custom')} style={{background:preset==='custom'?'var(--sel-bg)':'transparent',border:`1px solid ${preset==='custom'?'#ffaa3066':'var(--brd)'}`,color:preset==='custom'?'#ffaa30':'var(--dim3)',padding:'5px 10px',fontSize:retro?14:10,cursor:'pointer',fontFamily:'inherit',letterSpacing:1,borderRadius:'var(--r)',fontWeight:preset==='custom'?700:400}}>Custom</button>

          {init&&<div style={{marginLeft:'auto',fontFamily:'var(--fontD)',fontSize:retro?14:11,fontWeight:700,color:retro?'#000':'#556',background:retro?'#777':'#0a0d16',border:retro?'inset 1px #555':'1px solid #141824',padding:'2px 5px',borderRadius:'var(--r)',letterSpacing:1,fontVariantNumeric:'tabular-nums',display:'flex',gap:4,alignItems:'center'}}><span>{playing&&curTick>=0?`${Math.floor(curTick/Tpb_)+1}.${Math.floor((curTick%Tpb_)/tpBt)+1}`:'1.1'}</span><span style={{opacity:0.4}}>|</span><span>{(()=>{const s=curTick>=0?curTick*60/(bpm*64):0;return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;})()}</span></div>}
        </div>
        {init&&<>
          {/* CONTROLS */}

            <Slider label="SWG" color={retro?"#444":"#ffaa30"} value={swing} min={0} max={50} width={50} onChange={v=>{setSwing(v);swR.current=v;}}/>
            <Slider label="DLY" color={retro?"#444":"#20b8ff"} value={Math.round(dA*100)} min={0} max={100} width={50} onChange={v=>{setDA(v/100);eR.current?.sD(v/100);}}/>
            <Slider label="REV" color={retro?"#444":"#7040ff"} value={Math.round(rA*100)} min={0} max={100} width={50} onChange={v=>{setRA(v/100);eR.current?.sR(v/100);}}/>
            <Slider label="CRUSH" color={retro?"#444":"#ff5544"} value={Math.round(xA*100)} min={0} max={100} width={50} onChange={v=>{setXA(v/100);eR.current?.sX(v/100);}}/>
            <Slider label="VOL" color={retro?"#444":"#e040dd"} value={Math.round(mV*100)} min={0} max={100} width={50} onChange={v=>{setMV(v/100);if(!muted&&eR.current)eR.current.sM(v/100);}} onLabelClick={toggleMute} labelActive={muted}/>
            <label style={{display:'flex',alignItems:'center',gap:4}}><span style={{color:'#ff6040',fontWeight:700,fontSize:8}}>TIME</span><select value={`${ts[0]}/${ts[1]}`} onChange={e=>{const[n,d]=e.target.value.split('/').map(Number);setTs([n,d]);tsR.current=[n,d];}} style={{background:'#0e1018',color:'#aab',border:'1px solid #1a1e2a',padding:'2px 3px',fontFamily:'inherit',fontSize:9,borderRadius:2}}>{TS.map(([n,d])=><option key={`${n}/${d}`} value={`${n}/${d}`}>{n}/{d}</option>)}</select></label>

            <div style={{width:1,height:16,background:'var(--sep)'}}/>
            <label title="Note painted on melodic channels. Shift+click an empty cell to open the full octave picker." style={{display:'flex',alignItems:'center',gap:4}}><span style={{color:'#ff88cc',fontWeight:700,fontSize:8}}>NOTE</span><select value={paintNote} onChange={e=>{setPaintNote(e.target.value);pnR.current=e.target.value;}} style={{background:'#0e1018',color:'#aab',border:'1px solid #1a1e2a',padding:'2px 3px',fontFamily:'inherit',fontSize:9,borderRadius:2}}>{[1,2,3,4,5,6].map(o=>NOTES.map(n=><option key={n+o} value={n+o}>{(n+o).replace('-','')}</option>))}</select></label>

                {CH.map((ct,ci)=>{const hS=solos.some(s=>s);const iM=mutes[ci]||(hS&&!solos[ci]);return(<div key={ci} style={{width:colW,minWidth:colW,borderRight:'var(--grbd)',padding:'3px 2px',opacity:iM?0.3:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                  <span onClick={()=>setSV(sV===ci?null:ci)} style={{color:retro?'#ddd':ct.color,fontWeight:700,fontSize:retro?13:9,letterSpacing:2,cursor:'pointer'}}>{ct.name}</span>
                  <div style={{display:'flex',gap:1,alignItems:'center'}}>
                  <button onClick={()=>togM(ci)} style={{background:mutes[ci]?'var(--stop)':'var(--btn)',color:mutes[ci]?'#fff':'var(--dim)',border:'1px solid var(--brd2)',width:13,height:11,fontSize:retro?10:6,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:'var(--r)'}}>M</button>
                  <button onClick={()=>togS(ci)} style={{background:solos[ci]?'#ffaa30':'var(--btn)',color:solos[ci]?'#000':'var(--dim)',border:'1px solid var(--brd2)',width:13,height:11,fontSize:retro?10:6,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:'var(--r)'}}>S</button></div></div>);})}
              </div>
              <div style={{flex:1,position:'relative',overflow:'hidden'}}>

<><b style={lbl}>Desktop:</b> click a cell to toggle it. Drag across cells to paint a range. Right-click a note to edit velocity, probability, and condition.</>,
<><b style={lbl}>Mobile:</b> tap a drum cell to toggle. Tap an empty melodic cell to open the note picker. Tap-and-hold on any existing note to open the cell editor.</>,
<><b style={lbl}>Shift+click</b> an empty melodic cell (desktop) to open the octave picker directly.</>,
<><b style={lbl}>Spacebar</b> plays and stops.</>,
<>Click a channel name in the grid header (KCK, SNR, etc.) to pick its synth variant.</>,
])}
{sec('VARIANTS (A B C D)',[
<>The <b style={lbl}>+</b> button next to the preset list captures the current pattern as a new variant slot. The first press creates A and B, splitting bars 50/50. Up to 4 slots total.</>,
<>The letter next to each bar number shows which variant plays for that bar. Click it to cycle.</>,
<>The <b style={lbl}>A/B/C/D</b> buttons switch which variant you are editing. Edits to one variant do not affect the others.</>,
<>Mixer volumes, synth variants, mutes, and solos are global — they apply regardless of which variant is playing.</>,
])}
{sec('PROBABILITY & CONDITIONS',[
<>Right-click a note (long-press on touch) to open the cell editor.</>,
<><b style={lbl}>PROB</b> 0–100: chance the hit fires each time through.</>,
<><b style={lbl}>N:M</b> fires on bar N of every M bars within the pattern. Example: <b style={lbl}>1:2</b> alternates bars, <b style={lbl}>1:4</b> fires once every four bars.</>,
<><b style={lbl}>PRE</b> fires only if the previous trigger on this channel played. <b style={lbl}>!PRE</b> fires only if it did not.</>,
<>A small green dot on a cell means probability or a condition is set.</>,
])}
{sec('MIXER & MUTES',[
<>The <b style={lbl}>VOL</b> label in the top bar is a clickable master mute. Tap it to silence everything, tap again to restore. It flashes while muted.</>,
<><b style={lbl}>M</b> and <b style={lbl}>S</b> above each channel column mute or solo that channel.</>,
<>Open <b style={lbl}>MIXER</b> for per-channel faders and a master with its own mute button.</>,
])}
{sec('EXTERNAL MIDI OUT',[
<>The <b style={lbl}>MIDI OUT</b> selector appears in the header when a MIDI device is connected. Pick a device to send live MIDI alongside the internal audio.</>,
<>Drums are on <b style={lbl}>channel 10</b> (GM percussion): KCK=36, SNR=38, CH=42, OH=46, PERC=39.</>,
<><b style={lbl}>BASS</b> → ch 1, program 38 (Synth Bass 1).</>,
<><b style={lbl}>ACID</b> → ch 2, program 81 (Square Lead).</>,
<><b style={lbl}>LEAD</b> → ch 3, program 80 (Square Lead).</>,
<><b style={lbl}>PAD</b> → ch 4, program 89 (New Age Pad).</>,
<>Your receiving synth can ignore program changes if you want to patch it yourself. Probability and conditions are evaluated at play time, so MIDI out reflects what you hear.</>,

<><b style={lbl}>CRUSH</b> progressively reduces bit depth from 16 down to 2. High values are harsh by design.</>,
<><b style={lbl}>SWG</b> offsets off-beat 16ths for swing and shuffle feels.</>,
