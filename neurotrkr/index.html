  const ref=useRef(null),dragging=useRef(false);

  const calc=e=>{const r=ref.current.getBoundingClientRect();return Math.round(min+(max-min)*Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)));};

    <div ref={ref} onMouseDown={e=>{dragging.current=true;onChange(calc(e));}} onTouchStart={e=>{e.preventDefault();dragging.current=true;const t=e.touches[0];const r=ref.current.getBoundingClientRect();onChange(Math.round(min+(max-min)*Math.max(0,Math.min(1,(t.clientX-r.left)/r.width))));}} style={{width,height:8,background:'var(--sl-track,#0e1220)',borderRadius:4,cursor:'pointer',position:'relative',flexShrink:0}}>

            <Slider label="REV" color={retro?"#444":"#7040ff"} value={Math.round(rA*100)} min={0} max={100} width={50} onChange={v=>{setRA(v/100);eR.current?.sR(v/100);}}/>
            <Slider label="VOL" color={retro?"#444":"#e040dd"} value={Math.round(mV*100)} min={0} max={100} width={50} onChange={v=>{setMV(v/100);eR.current?.sM(v/100);}}/>

            <label style={{display:'flex',alignItems:'center',gap:4}}><span style={{color:'#a0bb30',fontWeight:700,fontSize:8}}>GRID</span><select value={gd} onChange={e=>setGd(+e.target.value)} style={{background:'#0e1018',color:'#aab',border:'1px solid #1a1e2a',padding:'2px 3px',fontFamily:'inherit',fontSize:9,borderRadius:2}}>{GD.map((g,i)=><option key={i} value={i}>{g.l}</option>)}</select></label>
            <div style={{width:1,height:16,background:'var(--sep)'}}/>

            <div style={{display:'flex',alignItems:'center',gap:3}}><span style={{color:'#ffdd44',fontWeight:700,fontSize:8}}>VEL</span>{VELS.map(v=><button key={v} onClick={()=>setVelW(v)} style={{background:vel===v?'#ffdd4433':'transparent',border:`1px solid ${vel===v?'#ffdd4466':'#1a1e2a'}`,color:vel===v?'#ffdd44':'#334',width:24,height:16,fontSize:8,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:2,fontWeight:700}}>{Math.round(v*100)}</button>)}</div>
          </div>
          {/* VIZ */}
          <div style={{display:'flex',gap:4,marginBottom:4,height:28,flexShrink:0}}>
            <div style={{flex:1,background:'var(--panel)',border:'var(--hdr-brd)',borderRadius:'var(--r)',overflow:'hidden'}}><svg viewBox="0 0 512 28" preserveAspectRatio="none" style={{width:'100%',height:'100%'}}>{wave&&(()=>{const pts=[];const sl=wave.length/512;for(let i=0;i<512;i++)pts.push(`${i},${(wave[Math.floor(i*sl)]/128)*14}`);return<polyline points={pts.join(' ')} fill="none" stroke="var(--wave)" strokeWidth="1" opacity="0.6"/>;})()}</svg></div>
            <div style={{flex:1,background:'var(--panel)',border:'var(--hdr-brd)',borderRadius:'var(--r)',overflow:'hidden'}}><svg viewBox="0 0 128 28" preserveAspectRatio="none" style={{width:'100%',height:'100%'}}>{freq&&(()=>{const b=[];for(let i=0;i<64;i++){const v=freq[i*2]/255;b.push(<rect key={i} x={i*2} y={28-v*25} width={1.5} height={v*25} fill={retro?`hsl(0,0%,${20+v*50}%)`:`hsl(${150+i*2.5},75%,50%)`} opacity={0.6}/>);}return b;})()}</svg></div>
          </div>
          {/* MAIN */}
          <div style={{flex:1,display:'flex',overflow:'hidden',borderRadius:'var(--r)'}}>
            {/* GRID */}
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',border:'var(--hdr-brd)',background:'var(--grid)'}}>
              <div style={{display:'flex',flexShrink:0,borderBottom:'var(--grbb)',background:'var(--panel)'}}>
                <div style={{width:RNW,minWidth:RNW,borderRight:'1px solid var(--sep)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:retro?11:7,color:'var(--dim)',padding:'4px 0'}}>ROW</div>
                {CH.map((ct,ci)=>{const hS=solos.some(s=>s);const iM=mutes[ci]||(hS&&!solos[ci]);return(<div key={ci} style={{width:colW,minWidth:colW,borderRight:'var(--grbd)',padding:'3px 2px',opacity:iM?0.3:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                  <span onClick={()=>setSV(sV===ci?null:ci)} style={{color:retro?'#ddd':ct.color,fontWeight:700,fontSize:retro?13:9,letterSpacing:2,cursor:'pointer'}}>{ct.name}</span>
                  <div style={{display:'flex',gap:1,alignItems:'center'}}>
                  <button onClick={()=>togM(ci)} style={{background:mutes[ci]?'var(--stop)':'var(--btn)',color:mutes[ci]?'#fff':'var(--dim)',border:'1px solid var(--brd2)',width:13,height:11,fontSize:retro?10:6,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:'var(--r)'}}>M</button>
                  <button onClick={()=>togS(ci)} style={{background:solos[ci]?'#ffaa30':'var(--btn)',color:solos[ci]?'#000':'var(--dim)',border:'1px solid var(--brd2)',width:13,height:11,fontSize:retro?10:6,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:'var(--r)'}}>S</button></div></div>);})}
              </div>
              <div style={{flex:1,position:'relative',overflow:'hidden'}}>
              {playing&&<div style={{position:'absolute',left:0,right:0,top:'50%',height:RH,marginTop:-RH/2,background:'var(--gra)',borderTop:`1px solid var(--grab)`,borderBottom:`1px solid var(--grab)`,pointerEvents:'none',zIndex:10}}/>}
              <div ref={gsR} style={{height:'100%',overflowY:'auto',overflowX:'auto',userSelect:'none',cursor:'crosshair'}} onMouseLeave={()=>{isPaint.current=false;lastPCell.current=-1;}}
              onTouchStart={e=>{const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);if(el&&el.dataset.ci!==undefined){const ci=+el.dataset.ci,r=+el.dataset.r;cellDown(ci,r,e);e.preventDefault();}}}
              onTouchMove={e=>{const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);if(el&&el.dataset.ci!==undefined&&isPaint.current){const ci=+el.dataset.ci,r=+el.dataset.r;cellEnter(ci,r);e.preventDefault();}}}
              onTouchEnd={()=>{isPaint.current=false;paintCh_.current=-1;lastPCell.current=-1;}}>
                {Array.from({length:totC},(_,r)=>{const tp=r*cT,barI=Math.floor(tp/Tpb_),inB=tp-barI*Tpb_,beatI=Math.floor(inB/tpBt),isBS=inB<cT,isBtS=!isBS&&Math.abs(inB-beatI*tpBt)<cT;const isAct=playing&&curTick>=tp&&curTick<tp+cT;const gs=Math.floor(r/4)%2===0;
                  return(<div key={r} style={{display:'flex',height:RH,minHeight:RH,borderTop:isBS?'var(--grbb)':isBtS?'var(--grbt)':'var(--grbd)',background:isAct?'var(--gra)':isBS?'var(--grb)':gs?'var(--gr1)':'var(--gr2)'}}>
                    <div style={{width:RNW,minWidth:RNW,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:5,fontSize:retro?10:7,borderRight:'var(--grbt)',color:isBS?'var(--grn)':isBtS?'var(--dim2)':'var(--dim)',fontWeight:isBS?700:400}}>{isBS?`${barI+1}.${beatI+1}`:isBtS?`.${beatI+1}`:r+1}</div>
                    {chs.map((ch,ci)=>{const ev=ch.events[tp];const ct=CH[ci];const hS=solos.some(s=>s);const iM=mutes[ci]||(hS&&!solos[ci]);const vp=ev?Math.round(ev.vel*100):0;
                      return(<div key={ci} data-ci={ci} data-r={r} onMouseDown={e=>cellDown(ci,r,e)} onMouseEnter={()=>cellEnter(ci,r)} style={{width:colW,minWidth:colW,height:RH,borderRight:'var(--grbd)',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',opacity:iM?0.2:1}}>
                        {ev&&ct.drum&&<><div style={{position:'absolute',left:2,top:3,bottom:3,width:`${vp}%`,maxWidth:colW-4,background:retro?'#777':ct.color,opacity:0.3+ev.vel*0.4,borderRadius:retro?0:1}}/><div style={{position:'relative',zIndex:1,fontSize:retro?10:7,color:retro?'#aaa':ct.color,fontWeight:600,opacity:retro?1:0.8}}>{Math.round(ev.vel*99)}</div></>}
                        {ev&&!ct.drum&&ev.note&&<><div style={{position:'absolute',left:2,top:3,bottom:3,width:`${vp}%`,maxWidth:colW-4,background:retro?'#555':ct.color,opacity:retro?0.3+ev.vel*0.3:0.15+ev.vel*0.25,borderRadius:retro?0:1}}/><span style={{position:'relative',zIndex:1,fontSize:retro?11:8,color:retro?'#ccc':ct.color,fontWeight:700}}>{ev.note.replace('-','')}</span></>}
                        {isAct&&<div style={{position:'absolute',inset:0,background:'var(--gra)',pointerEvents:'none'}}/>}
                      </div>);})}
                  </div>);})}
              </div></div>
            </div>
            {/* MIXER */}
            {showMix&&<div style={{width:MIX_W,flexShrink:0,background:'var(--panel)',borderLeft:'var(--hdr-brd)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <div style={{padding:'8px',fontSize:retro?16:10,fontWeight:700,color:'var(--mix-hdr)',letterSpacing:2,borderBottom:'var(--hdr-brd)',textAlign:'center',fontFamily:'var(--fontD)'}}>MIXER</div>
              <div style={{flex:1,overflowY:'auto',padding:'10px 8px',display:'flex',flexDirection:'column',gap:8}}>
                {CH.map((ct,i)=>{const hS=solos.some(s=>s);const iM=mutes[i]||(hS&&!solos[i]);return(<div key={i} style={{display:'flex',alignItems:'center',gap:5,opacity:iM?0.35:1}}>
                  <span style={{color:retro?'#ccc':ct.color,fontSize:retro?12:8,fontWeight:700,width:36,textAlign:'right',letterSpacing:1}}>{ct.name}</span>
                  <MixFader value={vols[i]} color={retro?'#444':ct.color} onChange={v=>updV(i,v)}/>
                  <span style={{fontSize:8,color:'#445',width:24,textAlign:'right'}}>{Math.round(vols[i]*100)}</span>
                  <button onClick={()=>togM(i)} style={{background:mutes[i]?'var(--stop)':'var(--btn)',color:mutes[i]?'#fff':'var(--dim)',border:'1px solid var(--brd2)',width:16,height:13,fontSize:retro?11:7,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:'var(--r)'}}>M</button>
                  <button onClick={()=>togS(i)} style={{background:solos[i]?'#ffaa30':'var(--btn)',color:solos[i]?'#000':'var(--dim)',border:'1px solid var(--brd2)',width:16,height:13,fontSize:retro?11:7,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:'var(--r)'}}>S</button>
                </div>);})}
              </div>
            </div>}
          </div>
        </>}
        {sV!==null&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'var(--blur)'}} onClick={()=>setSV(null)}><div onClick={e=>e.stopPropagation()} style={{background:'var(--modal)',border:'var(--modal-brd)',padding:16,minWidth:220,borderRadius:'var(--r)',boxShadow:'var(--shadow)'}}><div style={{fontSize:retro?18:12,fontWeight:700,color:retro?'#333':CH[sV].color,marginBottom:12,letterSpacing:2,fontFamily:'var(--fontD)'}}>{CH[sV].name}</div>{VR[CH[sV].id].map((v,vi)=><button key={vi} onClick={()=>setVa(sV,vi)} style={{display:'block',width:'100%',marginBottom:3,background:vars[sV]===vi?(retro?'#ddd':`${CH[sV].color}18`):'var(--grid)',border:`1px solid ${vars[sV]===vi?(retro?'#888':CH[sV].color+'55'):'var(--brd)'}`,color:vars[sV]===vi?(retro?'#000':CH[sV].color):'var(--dim2)',padding:'7px 12px',fontSize:retro?16:10,cursor:'pointer',fontFamily:'inherit',textAlign:'left',borderRadius:'var(--r)'}}>{vi+1}. {v.name}</button>)}</div></div>}
        {eN&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'var(--blur)'}} onClick={()=>setEN(null)}><div onClick={e=>e.stopPropagation()} style={{background:'var(--modal)',border:'var(--modal-brd)',padding:16,maxWidth:500,width:'92%',borderRadius:'var(--r)',boxShadow:'var(--shadow)'}}><div style={{fontSize:retro?16:11,fontWeight:700,color:'var(--acc)',marginBottom:4,fontFamily:'var(--fontD)'}}>SELECT NOTE</div><div style={{fontSize:retro?12:8,color:'var(--dim2)',marginBottom:10}}>Pick note then drag to paint. Row {eN.cell+1} / {CH[eN.ch].name}</div>{[1,2,3,4,5,6].map(oct=><div key={oct} style={{display:'flex',gap:2,marginBottom:2}}><span style={{width:16,fontSize:8,color:'#334',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{oct}</span>{NOTES.map(n=>{const full=n+oct,sh=n.includes('#');return<button key={full} onClick={()=>placeNote(eN.ch,eN.cell,full)} style={{background:sh?(retro?'#444':'#14182a'):(retro?'#666':'#0e1220'),color:sh?(retro?'#aaccff':'#88aaff'):(retro?'#fff':'#aab'),border:`1px solid ${sh?'var(--brd3)':'var(--brd2)'}`,padding:'5px 0',fontSize:retro?14:9,cursor:'pointer',fontFamily:'inherit',flex:1,minWidth:0,borderRadius:'var(--r)',fontWeight:500}}>{n.replace('-','')}</button>;})}</div>)}<button onClick={()=>setEN(null)} style={{marginTop:10,background:'var(--btn)',color:'var(--dim2)',border:'1px solid var(--brd3)',padding:'5px 14px',fontSize:retro?14:9,cursor:'pointer',fontFamily:'inherit',borderRadius:'var(--r)'}}>CANCEL</button></div></div>}
        {!init&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:28,zIndex:50}}><h1 style={{fontSize:retro?48:40,fontWeight:800,letterSpacing:10,margin:0,fontFamily:'var(--fontD)',background:'var(--accG)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>NEUROTRKR</h1><button onClick={initA} style={{background:'var(--accB)',color:'#000',border:'none',padding:'14px 48px',fontSize:retro?20:14,fontWeight:800,letterSpacing:5,cursor:'pointer',fontFamily:'var(--fontD)',borderRadius:'var(--r)',boxShadow:'var(--glow)',display:'flex',alignItems:'center',gap:6}}><svg viewBox="0 0 10 12" width="12" height="14" fill="currentColor"><path d="M0 0L10 6L0 12z"/></svg>START</button></div>}
      </div>
    </div>);
}
