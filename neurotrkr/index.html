  useEffect(()=>{if(playing&&curTick>=0&&gsR.current){const cr=Math.floor(curTick/cT);const vh=gsR.current.clientHeight;gsR.current.scrollTop=cr*RH-vh/2+RH/2;}},[curTick,playing,cT]);
  // Spacebar play/stop
  useEffect(()=>{const h=e=>{if(e.code==='Space'&&!eN&&!sV&&e.target.tagName!=='INPUT'&&e.target.tagName!=='SELECT'){e.preventDefault();if(pR.current)stopP();else startP();}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[startP,stopP,eN,sV]);
  const setVelW=v=>{setVel(v);velR.current=v;};

  const allPresets=[...Object.entries(PR),['custom',{name:'Custom'}]];

  return(
    <div style={{background:'#060810',color:'#b8bcc8',fontFamily:"'JetBrains Mono',monospace",height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{display:'flex',flexDirection:'column',height:'100%',padding:'6px 12px'}}>
        {/* HEADER */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:6,marginBottom:6,borderBottom:'1px solid #141824',flexShrink:0}}>
          <h1 style={{margin:0,fontSize:17,fontWeight:800,fontFamily:"'Oxanium',sans-serif",letterSpacing:5,background:'linear-gradient(90deg,#00ff88,#00ddff)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>NEUROTRKR</h1>
          {!init?<button onClick={initA} style={{background:'linear-gradient(135deg,#00ff88,#00cc66)',color:'#000',border:'none',padding:'7px 24px',fontSize:12,fontWeight:700,letterSpacing:3,cursor:'pointer',fontFamily:"'Oxanium',sans-serif",borderRadius:2,display:'flex',alignItems:'center',gap:4}}><svg viewBox="0 0 10 12" width="10" height="12" fill="currentColor"><path d="M0 0L10 6L0 12z"/></svg>START</button>
          :<div style={{display:'flex',gap:6,alignItems:'center'}}>
            <button onClick={playing?stopP:startP} style={{background:playing?'#ff2d40':'#00ff88',color:'#000',border:'none',padding:'6px 18px',fontSize:11,fontWeight:700,letterSpacing:1,cursor:'pointer',fontFamily:'inherit',borderRadius:2,display:'flex',alignItems:'center',gap:3}}>{playing?<><span>&#9632;</span> STOP</>:<><svg viewBox="0 0 10 12" width="9" height="11" fill="currentColor"><path d="M0 0L10 6L0 12z"/></svg>PLAY</>}</button>
            <button onClick={clearAll} style={{background:'transparent',border:'1px solid #ff2d4044',color:'#ff2d40',padding:'6px 14px',fontSize:9,fontWeight:700,cursor:'pointer',fontFamily:'inherit',borderRadius:2,letterSpacing:1}}>CLEAR</button>
            <button onClick={()=>setShowMix(!showMix)} style={{background:showMix?'#141824':'transparent',border:`1px solid ${showMix?'#00ff8844':'#141824'}`,color:showMix?'#00ff88':'#445',padding:'6px 14px',fontSize:9,fontWeight:700,cursor:'pointer',fontFamily:'inherit',borderRadius:2,letterSpacing:1}}>MIXER</button>
          </div>}
        </div>
        {/* PRESETS */}
        <div style={{display:'flex',gap:6,marginBottom:6,flexShrink:0,flexWrap:'wrap'}}>
          {allPresets.map(([id,p])=><button key={id} onClick={()=>loadP(id)} style={{background:preset===id?'#0e1420':'transparent',border:`1px solid ${preset===id?(id==='custom'?'#ffaa3066':'#00ff8866'):'#141824'}`,color:preset===id?(id==='custom'?'#ffaa30':'#00ff88'):'#3a4050',padding:'5px 14px',fontSize:10,cursor:'pointer',fontFamily:'inherit',letterSpacing:1,borderRadius:2,fontWeight:preset===id?700:400}}>{p.name}</button>)}
        </div>
        {init&&<>
          {/* CONTROLS */}
          <div style={{display:'flex',gap:14,alignItems:'center',marginBottom:5,padding:'5px 10px',background:'#0a0d16',border:'1px solid #141824',borderRadius:2,flexWrap:'wrap',flexShrink:0}}>
            <Slider label="BPM" color="#00ff88" value={bpm} min={40} max={240} width={70} onChange={v=>{setBpm(v);bR.current=v;}}/>
            <Slider label="SWG" color="#ffaa30" value={swing} min={0} max={50} width={50} onChange={v=>{setSwing(v);swR.current=v;}}/>
            <Slider label="DLY" color="#20b8ff" value={Math.round(dA*100)} min={0} max={100} width={50} onChange={v=>{setDA(v/100);eR.current?.sD(v/100);}}/>
            <Slider label="REV" color="#7040ff" value={Math.round(rA*100)} min={0} max={100} width={50} onChange={v=>{setRA(v/100);eR.current?.sR(v/100);}}/>
            <Slider label="VOL" color="#e040dd" value={Math.round(mV*100)} min={0} max={100} width={50} onChange={v=>{setMV(v/100);eR.current?.sM(v/100);}}/>
            <div style={{width:1,height:16,background:'#1e2540'}}/>
            <label style={{display:'flex',alignItems:'center',gap:4}}><span style={{color:'#ff6040',fontWeight:700,fontSize:8}}>TIME</span><select value={`${ts[0]}/${ts[1]}`} onChange={e=>{const[n,d]=e.target.value.split('/').map(Number);setTs([n,d]);tsR.current=[n,d];}} style={{background:'#0e1018',color:'#aab',border:'1px solid #1a1e2a',padding:'2px 3px',fontFamily:'inherit',fontSize:9,borderRadius:2}}>{TS.map(([n,d])=><option key={`${n}/${d}`} value={`${n}/${d}`}>{n}/{d}</option>)}</select></label>
            <label style={{display:'flex',alignItems:'center',gap:4}}><span style={{color:'#40dda0',fontWeight:700,fontSize:8}}>BARS</span><input type="number" min={1} max={128} value={bars} onChange={e=>{const v=Math.max(1,Math.min(128,+e.target.value||1));setBars(v);bsR.current=v;}} style={{background:'#0e1018',color:'#aab',border:'1px solid #1a1e2a',padding:'2px 3px',width:36,fontFamily:'inherit',fontSize:9,borderRadius:2}}/></label>
            <label style={{display:'flex',alignItems:'center',gap:4}}><span style={{color:'#a0bb30',fontWeight:700,fontSize:8}}>GRID</span><select value={gd} onChange={e=>setGd(+e.target.value)} style={{background:'#0e1018',color:'#aab',border:'1px solid #1a1e2a',padding:'2px 3px',fontFamily:'inherit',fontSize:9,borderRadius:2}}>{GD.map((g,i)=><option key={i} value={i}>{g.l}</option>)}</select></label>
            <div style={{width:1,height:16,background:'#1e2540'}}/>
            <label style={{display:'flex',alignItems:'center',gap:4}}><span style={{color:'#ff88cc',fontWeight:700,fontSize:8}}>NOTE</span><select value={paintNote} onChange={e=>{setPaintNote(e.target.value);pnR.current=e.target.value;}} style={{background:'#0e1018',color:'#aab',border:'1px solid #1a1e2a',padding:'2px 3px',fontFamily:'inherit',fontSize:9,borderRadius:2}}>{[1,2,3,4,5,6].map(o=>NOTES.map(n=><option key={n+o} value={n+o}>{(n+o).replace('-','')}</option>))}</select></label>
            <div style={{display:'flex',alignItems:'center',gap:3}}><span style={{color:'#ffdd44',fontWeight:700,fontSize:8}}>VEL</span>{VELS.map(v=><button key={v} onClick={()=>setVelW(v)} style={{background:vel===v?'#ffdd4433':'transparent',border:`1px solid ${vel===v?'#ffdd4466':'#1a1e2a'}`,color:vel===v?'#ffdd44':'#334',width:24,height:16,fontSize:8,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:2,fontWeight:700}}>{Math.round(v*100)}</button>)}</div>
          </div>
          {/* VIZ */}
          <div style={{display:'flex',gap:4,marginBottom:4,height:28,flexShrink:0}}>
            <div style={{flex:1,background:'#0a0d16',border:'1px solid #141824',borderRadius:2,overflow:'hidden'}}><svg viewBox="0 0 512 28" preserveAspectRatio="none" style={{width:'100%',height:'100%'}}>{wave&&(()=>{const pts=[];const sl=wave.length/512;for(let i=0;i<512;i++)pts.push(`${i},${(wave[Math.floor(i*sl)]/128)*14}`);return<polyline points={pts.join(' ')} fill="none" stroke="#00ff88" strokeWidth="1" opacity="0.6"/>;})()}</svg></div>
            <div style={{flex:1,background:'#0a0d16',border:'1px solid #141824',borderRadius:2,overflow:'hidden'}}><svg viewBox="0 0 128 28" preserveAspectRatio="none" style={{width:'100%',height:'100%'}}>{freq&&(()=>{const b=[];for(let i=0;i<64;i++){const v=freq[i*2]/255;b.push(<rect key={i} x={i*2} y={28-v*25} width={1.5} height={v*25} fill={`hsl(${150+i*2.5},75%,50%)`} opacity={0.6}/>);}return b;})()}</svg></div>
          </div>
          {/* MAIN */}
          <div style={{flex:1,display:'flex',overflow:'hidden',borderRadius:2}}>
            {/* GRID */}
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',border:'1px solid #141824',background:'#080b14'}}>
              <div style={{display:'flex',flexShrink:0,borderBottom:'2px solid #1a2030',background:'#0a0e18'}}>
                <div style={{width:RNW,minWidth:RNW,borderRight:'1px solid #1a2030',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#334',padding:'4px 0'}}>ROW</div>
                {CH.map((ct,ci)=>{const hS=solos.some(s=>s);const iM=mutes[ci]||(hS&&!solos[ci]);return(<div key={ci} style={{width:colW,minWidth:colW,borderRight:'1px solid #10141e',padding:'3px 2px',opacity:iM?0.3:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                  <span style={{color:ct.color,fontWeight:700,fontSize:9,letterSpacing:2}}>{ct.name}</span>
                  <div style={{display:'flex',gap:1,alignItems:'center'}}><button onClick={()=>setSV(sV===ci?null:ci)} style={{background:'#0e1018',border:'1px solid #1a1e2a',color:'#556',padding:'0 3px',fontSize:6,cursor:'pointer',fontFamily:'inherit',lineHeight:'11px',borderRadius:1,maxWidth:colW-30,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{VR[ct.id][vars[ci]]?.name}</button>
                  <button onClick={()=>togM(ci)} style={{background:mutes[ci]?'#ff2d40':'#0e1018',color:mutes[ci]?'#fff':'#334',border:'1px solid #1a1e2a',width:13,height:11,fontSize:6,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:1}}>M</button>
                  <button onClick={()=>togS(ci)} style={{background:solos[ci]?'#ffaa30':'#0e1018',color:solos[ci]?'#000':'#334',border:'1px solid #1a1e2a',width:13,height:11,fontSize:6,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:1}}>S</button></div></div>);})}
              </div>
              <div style={{flex:1,position:'relative',overflow:'hidden'}}>
              {playing&&<div style={{position:'absolute',left:0,right:0,top:'50%',height:RH,marginTop:-RH/2,background:'rgba(0,255,136,0.08)',borderTop:'1px solid #00ff8855',borderBottom:'1px solid #00ff8855',pointerEvents:'none',zIndex:10}}/>}
              <div ref={gsR} style={{height:'100%',overflowY:'auto',overflowX:'auto',userSelect:'none',cursor:'crosshair'}} onMouseLeave={()=>{isPaint.current=false;lastPCell.current=-1;}}
              onTouchStart={e=>{const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);if(el&&el.dataset.ci!==undefined){const ci=+el.dataset.ci,r=+el.dataset.r;cellDown(ci,r,e);e.preventDefault();}}}
              onTouchMove={e=>{const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);if(el&&el.dataset.ci!==undefined&&isPaint.current){const ci=+el.dataset.ci,r=+el.dataset.r;cellEnter(ci,r);e.preventDefault();}}}
              onTouchEnd={()=>{isPaint.current=false;paintCh_.current=-1;lastPCell.current=-1;}}>
                {Array.from({length:totC},(_,r)=>{const tp=r*cT,barI=Math.floor(tp/Tpb_),inB=tp-barI*Tpb_,beatI=Math.floor(inB/tpBt),isBS=inB<cT,isBtS=!isBS&&Math.abs(inB-beatI*tpBt)<cT;const isAct=playing&&curTick>=tp&&curTick<tp+cT;const gs=Math.floor(r/4)%2===0;
                  return(<div key={r} style={{display:'flex',height:RH,minHeight:RH,borderTop:isBS?'2px solid #1e2540':isBtS?'1px solid #141828':'1px solid #0c0f18',background:isAct?'rgba(0,255,136,0.07)':isBS?'#0c0f1a':gs?'#090c14':'#080a12'}}>
                    <div style={{width:RNW,minWidth:RNW,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:5,fontSize:7,borderRight:'1px solid #141828',color:isBS?'#00ff8888':isBtS?'#445':'#222',fontWeight:isBS?700:400}}>{isBS?`${barI+1}.${beatI+1}`:isBtS?`.${beatI+1}`:r+1}</div>
                    {chs.map((ch,ci)=>{const ev=ch.events[tp];const ct=CH[ci];const hS=solos.some(s=>s);const iM=mutes[ci]||(hS&&!solos[ci]);const vp=ev?Math.round(ev.vel*100):0;
                      return(<div key={ci} data-ci={ci} data-r={r} onMouseDown={e=>cellDown(ci,r,e)} onMouseEnter={()=>cellEnter(ci,r)} style={{width:colW,minWidth:colW,height:RH,borderRight:'1px solid #0c0f18',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',opacity:iM?0.2:1}}>
                        {ev&&ct.drum&&<><div style={{position:'absolute',left:2,top:3,bottom:3,width:`${vp}%`,maxWidth:colW-4,background:ct.color,opacity:0.3+ev.vel*0.4,borderRadius:1}}/><div style={{position:'relative',zIndex:1,fontSize:7,color:ct.color,fontWeight:600,opacity:0.8}}>{Math.round(ev.vel*99)}</div></>}
                        {ev&&!ct.drum&&ev.note&&<><div style={{position:'absolute',left:2,top:3,bottom:3,width:`${vp}%`,maxWidth:colW-4,background:ct.color,opacity:0.15+ev.vel*0.25,borderRadius:1}}/><span style={{position:'relative',zIndex:1,fontSize:8,color:ct.color,fontWeight:700}}>{ev.note.replace('-','')}</span></>}
                        {isAct&&<div style={{position:'absolute',inset:0,background:'rgba(0,255,136,0.06)',pointerEvents:'none'}}/>}
                      </div>);})}
                  </div>);})}
              </div></div>
            </div>
            {/* MIXER */}
            {showMix&&<div style={{width:MIX_W,flexShrink:0,background:'#0a0d16',borderLeft:'1px solid #141824',display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <div style={{padding:'8px',fontSize:10,fontWeight:700,color:'#556',letterSpacing:2,borderBottom:'1px solid #141824',textAlign:'center',fontFamily:"'Oxanium',sans-serif"}}>MIXER</div>
              <div style={{flex:1,overflowY:'auto',padding:'10px 8px',display:'flex',flexDirection:'column',gap:8}}>
                {CH.map((ct,i)=>{const hS=solos.some(s=>s);const iM=mutes[i]||(hS&&!solos[i]);return(<div key={i} style={{display:'flex',alignItems:'center',gap:5,opacity:iM?0.35:1}}>
                  <span style={{color:ct.color,fontSize:8,fontWeight:700,width:36,textAlign:'right',letterSpacing:1}}>{ct.name}</span>
                  <MixFader value={vols[i]} color={ct.color} onChange={v=>updV(i,v)}/>
                  <span style={{fontSize:8,color:'#445',width:24,textAlign:'right'}}>{Math.round(vols[i]*100)}</span>
                  <button onClick={()=>togM(i)} style={{background:mutes[i]?'#ff2d40':'#0e1018',color:mutes[i]?'#fff':'#334',border:'1px solid #1a1e2a',width:16,height:13,fontSize:7,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:1}}>M</button>
                  <button onClick={()=>togS(i)} style={{background:solos[i]?'#ffaa30':'#0e1018',color:solos[i]?'#000':'#334',border:'1px solid #1a1e2a',width:16,height:13,fontSize:7,cursor:'pointer',fontFamily:'inherit',padding:0,borderRadius:1}}>S</button>
                </div>);})}
              </div>
            </div>}
          </div>
        </>}
        {sV!==null&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.75)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>setSV(null)}><div onClick={e=>e.stopPropagation()} style={{background:'#0c0f18',border:'1px solid #1e2540',padding:16,minWidth:220,borderRadius:4,boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}><div style={{fontSize:12,fontWeight:700,color:CH[sV].color,marginBottom:12,letterSpacing:2,fontFamily:"'Oxanium',sans-serif"}}>{CH[sV].name}</div>{VR[CH[sV].id].map((v,vi)=><button key={vi} onClick={()=>setVa(sV,vi)} style={{display:'block',width:'100%',marginBottom:3,background:vars[sV]===vi?`${CH[sV].color}18`:'#080b14',border:`1px solid ${vars[sV]===vi?CH[sV].color+'55':'#141824'}`,color:vars[sV]===vi?CH[sV].color:'#667',padding:'7px 12px',fontSize:10,cursor:'pointer',fontFamily:'inherit',textAlign:'left',borderRadius:2}}>{vi+1}. {v.name}</button>)}</div></div>}
        {eN&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.75)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>setEN(null)}><div onClick={e=>e.stopPropagation()} style={{background:'#0c0f18',border:'1px solid #1e2540',padding:16,maxWidth:500,width:'92%',borderRadius:4,boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}><div style={{fontSize:11,fontWeight:700,color:'#00ff88',marginBottom:4,fontFamily:"'Oxanium',sans-serif"}}>SELECT NOTE</div><div style={{fontSize:8,color:'#445',marginBottom:10}}>Pick note then drag to paint. Row {eN.cell+1} / {CH[eN.ch].name}</div>{[1,2,3,4,5,6].map(oct=><div key={oct} style={{display:'flex',gap:2,marginBottom:2}}><span style={{width:16,fontSize:8,color:'#334',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{oct}</span>{NOTES.map(n=>{const full=n+oct,sh=n.includes('#');return<button key={full} onClick={()=>placeNote(eN.ch,eN.cell,full)} style={{background:sh?'#14182a':'#0e1220',color:sh?'#88aaff':'#aab',border:`1px solid ${sh?'#1e2540':'#181c2a'}`,padding:'5px 0',fontSize:9,cursor:'pointer',fontFamily:'inherit',flex:1,minWidth:0,borderRadius:2,fontWeight:500}}>{n.replace('-','')}</button>;})}</div>)}<button onClick={()=>setEN(null)} style={{marginTop:10,background:'#141824',color:'#445',border:'1px solid #1e2540',padding:'5px 14px',fontSize:9,cursor:'pointer',fontFamily:'inherit',borderRadius:2}}>CANCEL</button></div></div>}
        {!init&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'#060810',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:28,zIndex:50}}><h1 style={{fontSize:40,fontWeight:800,letterSpacing:10,margin:0,fontFamily:"'Oxanium',sans-serif",background:'linear-gradient(90deg,#00ff88,#00ddff)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>NEUROTRKR</h1><button onClick={initA} style={{background:'linear-gradient(135deg,#00ff88,#00cc66)',color:'#000',border:'none',padding:'14px 48px',fontSize:14,fontWeight:800,letterSpacing:5,cursor:'pointer',fontFamily:"'Oxanium',sans-serif",borderRadius:3,boxShadow:'0 0 40px #00ff8833',display:'flex',alignItems:'center',gap:6}}><svg viewBox="0 0 10 12" width="12" height="14" fill="currentColor"><path d="M0 0L10 6L0 12z"/></svg>START</button></div>}
      </div>
    </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script></body></html>
